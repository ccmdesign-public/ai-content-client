[build]
  command = "pnpm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  # Increase memory for builds with many summary pages (8GB max on Netlify)
  NODE_OPTIONS = "--max-old-space-size=8192"
  # Disable all secret scanning - video summaries discuss API keys/tokens causing false positives
  # See: https://ntl.fyi/configure-secrets-scanning
  SECRETS_SCAN_ENABLED = "false"

# Netlify Functions for triggering sync
[functions]
  directory = "netlify/functions"

# Headers for caching static assets
[[headers]]
  for = "/_nuxt/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/summaries/*"
  [headers.values]
    Cache-Control = "public, max-age=3600"

# RSS feeds
[[headers]]
  for = "/*.xml"
  [headers.values]
    Cache-Control = "public, max-age=3600"
    Content-Type = "application/rss+xml; charset=utf-8"

# Agent-accessible text endpoints
[[headers]]
  for = "/*.txt"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/guides/*.md"
  [headers.values]
    Cache-Control = "public, max-age=3600"
