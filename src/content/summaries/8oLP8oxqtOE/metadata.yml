title: "Claude Code + CMUX: The Ultimate AI Coding Terminal"
description: >-
  Cmux is a revolutionary terminal by Lawrence Chen, built specifically for AI
  coding agents that gives them the power to control browsers, spawn subagents
  in split panes, send notifications, and manage workflows through a simple CLI
  or the socket API. Unlike Warp or WezTerm, CMUX is a native macOS app built on
  libghostty and bonsplit that integrates seamlessly with Claude Code hooks and
  skills, letting your AI agents work side-by-side with web browsers, track test
  progress in sidebars, and coordinate multiple subagents across workspaces, all
  without the overhead of Electron apps. Whether you're using Claude Code or
  another agent harness, CMUX transforms how your AI assistants interact with
  your development environment.


