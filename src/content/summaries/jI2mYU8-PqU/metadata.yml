title: NEW Browser API That Makes AI Agents Actually Work (WebMCP)
description: |-
  There's a new proposal backed by Google and Microsoft called WebMCP, and it could change how AI agents interact with websites forever. Instead of relying on Playwright, HTML parsing, or screenshot-based approaches, WebMCP lets frontend developers expose site features as MCP tools directly in the browser.

