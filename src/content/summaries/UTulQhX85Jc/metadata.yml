title: "Talk to your data: Build AI agents to query databases & analyze video
  (Google ADK)"
description: >-
  Try out the Agent Development Kit (ADK) → https://goo.gle/4u2dltM


  Look, we’re all a little tired of "cute" AI chatbots that don't actually do
  anything. In this video, Ana Esqueda shows Martin Omander how to build a tool
  that provides real business value using the Agent Development Kit (ADK).


  We’re moving beyond the sandbox to build a Marketing Optimizer Agent that
  democratizes data access. Instead of writing SQL, you can just "talk" to your
  database to pull performance metrics or use Gemini’s multi-modal capabilities
  to analyze the narrative of a YouTube video.


  The Tech Stack:

  1️⃣ Logic: Built with the ADK and deployed to agent engine.

  2️⃣ Backend: A FastAPI app hosted on Cloud Run.

  3️⃣ Data: Direct queries to BigQuery and video analysis via Gemini.

  It’s a practical look at how to stop building toys and start building tools
  that combine quantitative data with qualitative insights.


