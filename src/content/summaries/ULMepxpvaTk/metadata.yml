  Key Changes in This Release:

  - Prompt cache invalidation fix: SDK query() calls now cache correctly,
  reducing input token costs by up to 12x per conversation

  - Bash auto-approval: lsof, pgrep, tput, ss, fd, and fdfind join the
  auto-approved list — fewer permission prompts for read-only operations

  - Tree-sitter parsing: find -exec, variable assignments, and command
  substitutions no longer trigger false-positive permission prompts

  - Native bash parsing module: replaces the old parser with faster
  initialization and zero memory leaks

  - Plugin stability on Windows: EEXIST errors in OneDrive folders, marketplace
  scope blocking, literal tilde cache directories, and marketplace-only fields
  in plugin.json all resolved

  - /plan description argument: type "/plan fix the auth bug" to jump straight
  into plan mode

  - ExitWorktree tool: cleanly leave EnterWorktree sessions without manual git
  cleanup

  - VS Code URI handler: open Claude Code tabs programmatically via
  vscode://anthropic.claude-code/open


