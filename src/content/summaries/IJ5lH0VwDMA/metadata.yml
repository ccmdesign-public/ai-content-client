title: Claude will wipe out 90% of agencies
description: >-
  I hadn't posted here in over a year. Here's why I'm back.


  The short version: Cowork just rebuilt a client dashboard in 15 minutes that
  took us two months and $10k to build the first time. That got my attention.

  This channel is going to document how AI — specifically Claude — is changing
  the agency business in real time. Not in theory. Not with scripts and fancy
  sets. From my desk, in the middle of actually running two agencies.


  I think we're 6-12 months away from one-person businesses doing
  multi-millions. I think the agencies that survive are going to be lean,
  strategy-first, with AI doing the execution. And I think the agencies that
  don't adapt are going to get crushed.


  No fancy editing. No AI-written scripts. Just workflows, honest takes, and
  what's actually working.


  If you're building something real, this is for you.


  🔔 Subscribe — I'm posting daily.
