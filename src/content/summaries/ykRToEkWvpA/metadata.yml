  In 2023, I coined the AI Automation Agency (AAA) model and told everyone it
  was the future of making money with AI. They called me crazy. Three years
  later, thousands of AI agencies have launched, my agency Morningside AI works
  with Fortune 500 companies and NBA teams, and an entire industry was built
  around it. Now I'm making the same bet again with what I'm calling AI
  Operating Systems (AIOS), using Claude Code to automate 60-70% of my business
  and run it from my phone. In this video, I break down the original contrarian
  call I made in 2023, the story of two non-technical founders who took action
  and built a business doing hundreds of thousands, why the skepticism around AI
  operating systems looks identical to what I faced before, and how I'm already
  using Claude Code and Telegram to build an AI-powered business system that
  works while I sleep. If you're a beginner looking to start an AI business in
  2026, an entrepreneur exploring AI automation, or just someone wondering
  whether this AI opportunity is real — this is the video I wish someone made
  for me three years ago.


