title: Apple Wins AI
description: >-
  Everyone's betting on NVIDIA and cloud AI. I think they're wrong. While
  Microsoft's CEO tells governments that AI will become a "public utility"
  powered by massive data centres, Apple has been quietly shipping AI
  infrastructure directly into hundreds of millions of devices.


  AI is just mathematics:  billions of calculations  per second. And Apple
  cracked how to do this efficiently on-device years ago with their M-series
  chips and Metal framework.


  Strip away the hype and AI is just software. Software needs hardware to run.
  And the closer that hardware is to the user, the faster and more private the
  experience becomes.


  Apple understood this before anyone else.


  While Big Tech was focused on who had the biggest data centre, Apple quietly
  put an AI engine in every laptop, tablet, and phone they sold.


  That's how Apple wins at AI.


  🔔 Subscribe for contrarian takes on tech, AI, and where the industry is
  actually heading.


