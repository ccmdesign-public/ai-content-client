title: 🚀Claude Skills Got An UPDATE | Check Your Skills Now!
description: |-
  This video discusses the challenges of trusting AI skills, noting that while 86% of engineers use AI daily, only 6% fully trust its output. It highlights that current claude code skills fail on over half of prompts and introduces methods like ab testing and automated description fixes. The content also touches on the importance of understanding the type of skill being tested before evaluation and promotes "DIY Smart Code" as a solution for improving ai tools skill development and testing.

