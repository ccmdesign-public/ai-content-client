title: Why Proof Became a Live Doc for Humans and Agents
description: >-
  Dan Shipper walks through how Proof evolved from a Mac app tracking AI vs.
  human writing into a live collaborative editor for humans and agents. ⁣

  ⁣

  The original version had provenance tracking, sub-agent integrations, and a
  polished native experience—but the feature that stuck was the simplest one:
  sharing a document where teammates and their agents can comment, edit, and
  collaborate in real time.⁣

  ⁣

  Try it at proofeditor.ai
