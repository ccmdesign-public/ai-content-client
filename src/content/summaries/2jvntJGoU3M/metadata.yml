title: How Kubernetes Services Work Across Multiple Nodes
description: >-
  When pods are spread across multiple nodes in Kubernetes, a NodePort service
  automatically spans all nodes in the cluster — no extra configuration needed.
  You can access your app using the IP of any node on the same port (like
  30008), even if no pod is scheduled on that node. 


  Full tutorial: https://youtu.be/XuSQU5Grv1g


