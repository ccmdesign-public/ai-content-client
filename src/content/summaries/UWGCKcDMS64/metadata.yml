title: Azure DevOps Engineer Question 23
description: >-
  The best strategy to retain standard artifacts for 30 days while keeping
  production artifacts indefinitely is to set a global 30-day retention policy
  and manually mark production releases to be retained. Unlike using Azure Blob
  storage without a policy (unbounded costs), manual deletion (error-prone), or
  pipeline variables (not for enforcement), this approach leverages the native
  capability of Azure Pipelines to override global retention for specific
  runs.  This ensures that temporary build data is automatically purged while
  critical deployment records remain secure and accessible for as long as
  needed.


