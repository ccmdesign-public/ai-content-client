title: Shocking Light-Powered Robot Runs Without Batteries & Cyborg Cockroach
description: >-
  Robotics just entered a very strange new phase. Scientists built a tiny robot
  that runs purely on light with no batteries, processors, motors, or
  electronics anywhere inside it. At the same time, engineers discovered how
  ordinary rice grains can form intelligent metamaterials that change their
  strength depending on how forces are applied. Military researchers are testing
  cyborg cockroach swarms for reconnaissance, powerful quadruped robots are
  getting faster and stronger, and humanoid machines are beginning to appear
  inside real factories. From mechanical intelligence and adaptive materials to
  robots assembling car parts and even robot monks answering questions in
  temples, robotics is expanding into places few people expected.


