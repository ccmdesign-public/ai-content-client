  CLI tools are trending up in the Claude Code ecosystem -- and for good reason.
  These tools extend what Claude Code can do far beyond just writing code. In
  this video, I walk you through my 10 favorite CLI tools that I use alongside
  Claude Code every day. They span everything from research and media processing
  to deploying production apps and controlling your entire Google suite, all
  from Claude Code. Whether you are brand new to CLI tools or already have a few
  installed, you will walk away with something new to add to your workflow.


  🔨Tools Mentioned in This Video:


  1. CLI Anything -- https://github.com/HKUDS/CLI-Anything

  2. NotebookLM CLI -- https://github.com/teng-lin/notebooklm-py

  3. Stripe -- http://github.com/stripe/stripe-cli

  4. ffmpeg -- https://github.com/FFmpeg/FFmpeg

  5. gh (GitHub CLI) -- https://github.com/cli/cli

  6. Supabase CLI -- https://github.com/supabase/cli

  7. Vercel CLI -- https://github.com/vercel/vercel

  8. Playwright CLI -- https://github.com/microsoft/playwright-cli

  9. LLMFit -- https://github.com/AlexsJones/llmfit

  10. gws (Google Workspace CLI) -- https://github.com/googleworkspace/cli



