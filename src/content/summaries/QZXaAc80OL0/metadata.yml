title: Claude Code Channels in 8 Minutes
description: >-
  Anthropic has released Channels for Claude Code, enabling external events (CI
  alerts, production errors, PR comments, Discord/Telegram messages, webhooks,
  cron jobs, logs, and monitoring signals) to be sent directly into running
  cloud code sessions. Unlike piping into a headless cold session, Channels
  support a warm, always-on session with continuity and large context windows,
  letting Claude react automatically while staying active; this complements
  Claude Code’s remote control feature, which is oriented toward manual review
  and control. The script describes how an MCP plugin runs as a local subprocess
  to bridge events and allow Claude to reply back, and gives an example where a
  CI failure triggers a webhook, Claude fixes the issue, pushes a change, and CI
  passes. A demo shows setting up a Telegram channel via BotFather, installing
  the official Telegram plugin, configuring the bot token, pairing with a
  session, and locking access to an allow list.


