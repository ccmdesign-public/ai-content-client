title: Autoresearch, Agent Loops and the Future of Work
description: >-
  Andrej Karpathy's Autoresearch demonstrates autonomous agent loops: agents
  edit training code, run fixed five-minute experiments, and commit only changes
  improving a single validation metric. Connections explored include the Ralph
  Wiggum iterative loop and multi-agent collaborative research. Applications
  range from LLM training and code generation to advertising and product
  experimentation, plus new high-level skills like evaluation design and
  programming agent memos.


