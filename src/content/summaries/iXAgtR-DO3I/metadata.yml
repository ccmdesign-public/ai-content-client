  Is Perplexity still focused on search? This week on Mixture of Experts, Host
  Tim Hwang is joined by Gabe Goodhart, Chris Hay and Aaron Baughman to break
  down what Perplexity Computer really offers—and whether closed systems can
  compete with open alternatives like OpenClaw, LangGraph and AutoGPT. Next,
  Anthropic introduces memory import for Claude. Is memory still a competitive
  moat, or can users now seamlessly switch between AI providers? Then, meet
  NullClaw, a minimalist agent framework that runs on just 678 kilobytes. Our
  experts debate whether edge-based agent swarms are the future—or just clever
  marketing. Finally, Particle6 unveils Tilly Norwood, the world’s first AI
  actor. Would you give an Oscar to an algorithm? All that and more on this
  week’s Mixture of Experts. 


