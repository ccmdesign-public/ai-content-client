title: Meta Replacing Creators? + Sam Altman’s Mistake & 3 Big AI Updates
description: >-
  *Get Matt's favorite AI tools:* https://clickhubspot.com/jfd


  Episode 101: Are AI social media agents replacing real creators on platforms
  like Meta? Matt Wolfe (https://x.com/mreflow) and Joe Fier
  (https://www.youtube.com/@joefier) dive deep into this week’s major AI
  releases and the evolving role of autonomous agents.

  This episode explores cutting-edge updates from OpenAI, Anthropic, and
  Canva—including interactive visual explainers and Canva’s Magic Layers—and how
  these tools transform user experience and content creation. The hosts also
  unpack Meta’s acquisition of Maltbook, the viral social media network for AI
  agents, and discuss the broader implications for creators, businesses, and
  marketers. Plus, with clips from Sam Altman and Jensen Huang, the conversation
  turns to the future of intelligence as a commodity, the rise of
  agent-optimized marketing, and the changing value of intuition versus IQ.
  Robots, new prompt formulas, and the "deader internet" theory round out this
  lively, unpredictable episode.


  Check out The Next Wave Podcast if you’re on the go and want to listen to the
  show: https://lnk.to/thenextwaveyt


