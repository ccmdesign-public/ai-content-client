title: "New in May ‘25: Global keyword metrics, unveiling anonymous queries, and more"
description: >-
  Explore Ahrefs’ May 2025 updates and see what's new for your workflow.


  ***************************************

  Additional Resources


  Report Builder ► https://ahrefs.com/report-builder


  Web Analytics ► https://ahrefs.com/web-analytics


  Site Explorer ► https://ahrefs.com/site-explorer


  AI Content Helper ► https://app.ahrefs.com/content-helper


  ***************************************

  This month we have 5 tool updates, and 2 general updates for you.


  Let’s start with Report Builder. You can now include GSC performance charts
  directly in Report Builder to monitor total clicks, impressions, average CTR,
  and position.


  Moving on to Web Analytics. Tracked events now include Outbound link clicks,
  letting you quickly see which external links visitors click most.


  Next up, Site Explorer. We have two updates here:


  ► Improved data coverage in Paid Keywords 3.0, now showing significantly more
  paid keywords.

  ► Global keyword metrics in the Organic keywords report, displaying global
  search volume and traffic, along with country-specific rankings.


  Moving on to AI Content Helper. Topics are fully editable now! You can also
  leverage AI suggestions for enhanced topical coverage.


  Next are GSC reports. Here we've introduced the Anonymous queries report,
  helping uncover keywords previously hidden in Google Search Console. Also, GSC
  reports have now been moved into their own section.


  Finally, on to our general updates.


  Our Enterprise users now have fully customizable tool access. Admins and
  Members still get access by default, but Guests need to be granted permission.


  #productupdates #productchanges #ahrefs
