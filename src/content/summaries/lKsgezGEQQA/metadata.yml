title: AWS AI Practitioner Question 24
description: >-
  For the AWS AI Practitioner exam, providing several ideal question-and-answer
  examples within a prompt to guide a model's behavior is known as Few-shot
  prompting. This technique is defined by the number of examples included:
  Zero-shot uses none, One-shot uses one, and Few-shot uses two or more. It is
  distinct from Fine-tuning, which involves retraining the model's weights, and
  Chain of Thought, which asks the model to explain its reasoning process.
  Unlike Reinforcement Learning, which uses rewards to shape behavior, few-shot
  prompting simply provides context to help the model recognize
  patterns.  Adding these examples is a powerful, low-cost way to improve
  accuracy without the need for complex retraining.


