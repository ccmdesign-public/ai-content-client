title: Claude Opus 4.6 1M Context Is Here. But There's a Problem!
description: |-
  Anthropic just shipped 1M context windows for Claude Opus 4.6 and Sonnet 4.6 at standard pricing. Opus 4.6 hits 78.3% on MRCR v2, the highest long-context retrieval score ever. But we've been stuck at ~1M tokens for two full years. The reason? A physical memory wall — HBM is sold out, DRAM prices are surging, and the KV cache for 1M tokens exceeds 300 GB. NVIDIA built ICMSP to work around it. Welcome to context rationing — where your context window becomes a tiered luxury good.

