description: >-
  Anthropic partnered with Mozilla for a security research sprint, where Claude
  Opus 4.6 scanned nearly 6,000 C++ files in Firefox. This effort identified 22
  vulnerabilities, 14 of which were high severity, representing about one-fifth
  of all high-severity Firefox bugs fixed in 2025. This showcases the
  significant impact of "artificial intelligence" in "cybersecurity" and
  "information security", delivering critical "ai news" for the tech community.


  Here's the full breakdown:

  - Scanned nearly 6,000 C++ files across the Firefox codebase

  - Found a Use After Free vulnerability in under 20 minutes

  - Submitted 112 unique reports (most fixed in Firefox 148)

  - Tried to exploit the bugs: ~$4,000 in API costs, only 2 successes


  AI is dramatically better at FINDING bugs than exploiting them. The defender
  advantage window is open right now.


  Full article: https://www.anthropic.com/news/mozilla-firefox-security


