title: How I Manage 10 Claude Code Agents Without Losing My Mind
description: >-
  📚 Obsidian x Claude Code Lab (starts Mar 17): https://lab.artemzhutov.com

  → Build your own AI-powered workspace with Claude Code agents - live, with me

  💬 Discord: https://discord.gg/g5Z4Wk2fDk


  I manage 10 Claude Code agents every day doing research, drafts, and video
  scripting all at the same time. I open a new tab, then another, and another -
  quickly I end up with 10 tabs and I don't know what's happening on each one.
  Switching between them kills my flow. Sessions go stale and context gets lost.


  Here's how I stopped losing my mind: cmux - a terminal workspace manager. The
  orchestrator pattern - one agent that spawns and controls the others. And an
  Obsidian dashboard that builds itself, showing me what each agent is doing and
  what needs attention.


  🎁 cmux + orchestrator + dashboard - ready to use:

  → Manage all your Claude Code agents from one terminal

  → No API keys, no setup - just drop in your vault and go 👇

  https://cmux-artemzhutov.netlify.app


  Follow me:

  Substack: https://artemxtech.substack.com/

  X: https://x.com/ArtemXTech

  GitHub: https://github.com/ArtemXTech


