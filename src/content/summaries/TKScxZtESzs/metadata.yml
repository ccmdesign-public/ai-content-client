title: How I Actually Use Claude Code in My Design Workflow
description: >-
  In this video, I walk through how I actually use Claude Code from Anthropic
  inside my real design workflow.


  From thinking through product ideas to refining UX decisions and writing
  clearer documentation, this is how I use AI day to day as a product designer
  to move faster and produce better work.


  If you’re a UI, UX, or Product Designer exploring how AI fits into your
  workflow, this will give you a practical starting point.


