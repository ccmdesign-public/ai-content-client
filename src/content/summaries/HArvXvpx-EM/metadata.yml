title: "Azure DevOps Engineer Exam: Question 7"
description: >-
  Azure App Service: Zero-Downtime Swaps! 🏗️


  The Challenge: Update a web app in Azure App Service with Zero Downtime.


  The Failures:

  - FTP/Direct Push: Overwrites files live—risks ""broken states.""

  - Single-Stage Pipeline: No safety net; if the build is bad, the site goes
  down.

  - Restarting: Causes a guaranteed outage.


  The Win: Deployment Slots 🎯

  - The Strategy: Deploy to a Staging Slot first.

  - Warm-up: Validate the app in the staging environment while production stays
  live.

  - The Swap: Perform a Slot Swap. Azure reroutes traffic instantly—no downtime,
  no sweat.


  Exam Tip: For AZ-400, ""Zero Downtime"" for Azure App Service always equals
  Deployment Slots + Swap. 🚀


