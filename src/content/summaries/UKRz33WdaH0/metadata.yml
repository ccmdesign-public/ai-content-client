title: "Google Just Dropped LYRIA 3: New AI Feature No One Expected"
description: >-
  Google just introduced a new wave of AI systems inside Gemini that go far
  beyond simple generation. Alongside the release of Lyria 3, Google is rolling
  out Pomelli and the Hatter agent, signaling a shift toward real-time,
  agent-driven, multimodal AI. These systems combine audio, text, images, and
  live control into a single stack, where models do not just output files but
  react, adapt, and stay coherent over time. With built-in attribution through
  SynthID and direct competition emerging from Suno and Udio, this marks a clear
  move from static AI tools toward interactive, steerable systems designed to
  operate continuously inside real products.


