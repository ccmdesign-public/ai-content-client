title: "The Library Meta-Skill: How I Distribute PRIVATE Skills, Agents and Prompts"
description: >-
  Engineers... If you're still COPY-PASTING SKILLS between repos, you've already
  LOST the agent race. Your competitors have a SYSTEM. You don't.


  🔥 The Library is the meta-skill that changes EVERYTHING about how you
  distribute your private skills, agents, and prompts across devices, teams, and
  agents.


  🎥 VIDEO REFERENCES

  • The Library Codebase: https://github.com/disler/the-library

  • Stripe's Agentic Layer: https://youtu.be/V5A1IU8VVp4

  • Claude Code Competitor: https://youtu.be/f8cfH5XX-XU

  • Meta-Agentics: https://youtu.be/zTcDwqopvKE


  🚀 MASTER AGENTIC CODING

  - Tactical Agentic Coding:
  https://agenticengineer.com/tactical-agentic-coding?y=_vpNQ6IwP9w


  Your best AI agent skills are scattered across ten plus code bases. They're
  out of sync, duplicated, and impossible to coordinate across your engineering
  team. The library meta-skill solves this with a single library.yaml config
  file that acts as your personal AI package manager for skill distribution.


  🛠️ Think of it like a package.json but for your agentics. The library.yaml
  stores references to private GitHub repositories and local file paths,
  creating a single source of truth for all your Claude Code skills, Codex CLI
  skills, and agent capabilities. No more copying, no more version drift, no
  more chaos.


  🚀 In this video, we walk through the full workflow: build your skills
  natively in your value-generating repos, catalog them with the library add
  command, then distribute and reuse them anywhere. Watch as we sync
  meta-agentics across a local machine and a Mac Mini agent device in real time,
  proving this skill management system works across any device or cloud sandbox.


  🔐 This is about PRIVATE skill distribution. Your top-notch skills, agents,
  and prompts should absolutely be private. The best agentic solutions are
  behind closed doors inside cracked teams building with agents. The library
  gives you a skill registry to distribute these privately and securely across
  your entire operation.


  💡 The library is a pure agent-first application. No code, just a skill and a
  YAML config. That means any agent can run the entire workflow: add, use, push,
  list, search, and sync. This is the future of agentic engineering, where
  entire applications live inside a single skill.


  🧠 Key capabilities:


  - Add skills, agents, and prompts to your catalog from any repo

  - Use them locally or globally across any device

  - Push updates back to the source repository

  - Sync to pull the latest versions everywhere

  - Search and list your entire skill registry instantly


  🌟 Whether you're scaling from custom agents to orchestrator agents, operating
  across multiple devices, or coordinating a team of engineers with their own
  agents, the library meta-skill is the missing piece. Stop managing your
  agentics the sloppy way. Build, catalog, distribute, use.


