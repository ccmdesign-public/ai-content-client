title: Building A Halo Infinite MCP App In Less Than An Hour (With Claude Code)
description: >-
  I've always wanted to view my Halo Infinite stats in Claude, but staring at
  tables and text descriptions just won't do, so - I embarked on a journey where
  I had Claude Opus 4.6 rewrite my Grunt API wrapper library (that was
  originally written for .NET) into TypeScript, and then promptly help me create
  all the scaffolding needed to see just how average of a Halo player I am - in
  real-time!


  You can explore more on this tinkering in my GitHub repository:
  https://github.com/dend/forerunner-mcp-app


  This video used a few things, if you are curious:


  - A Ubuntu installation with all the basic dev tools (git and Node)

  - Visual Studio Code Insiders (because I like living on the edge with dev
  tools)

  - Claude Code (and a Claude Max 20x subscription) with Opus 4.6

  - My libraries - Grunt (https://www.npmjs.com/package/@dendotdev/grunt) and
  Conch (https://www.npmjs.com/package/@dendotdev/conch)

  - A whole lot of patience (an hour's worth, TBH)


  #ai #claude #mcp #engineering #halo
