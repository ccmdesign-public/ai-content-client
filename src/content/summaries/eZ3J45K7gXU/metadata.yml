title: The Open-Source Copilot Alternative Devs Are Switching To (Tabby)
description: >-
  If you’re using GitHub Copilot, Tabnine, or Cursor… your code may be leaving
  your machine every time you accept a suggestion.


  In this video, we look at Tabby. An open-source, self-hosted AI coding
  assistant that gives you Copilot-level productivity without sending your code
  to the cloud. You’ll see a full Tabby demo, how to set it up in minutes using
  Docker, and why more devs are switching to local AI coding tools.


