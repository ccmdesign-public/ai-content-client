title: The Top 1% Build AI Presentations Differently. Here's How.
description: |-
  ️Try Gamma now ➡️ https://gam.link/jeffsu

  Most #AI presentation tutorials stop at the first draft. But if you've worked in any corporate environment, you know the draft is maybe 20% of the work. The other 80% is rounds of edits from stakeholders who all want different things.

  This video walks through a real workflow using #Gamma, covering seven realistic editing scenarios based on actual stakeholder roles: reordering narrative structure, adding slides with live data, verifying stats, transforming text into charts, fixing visual hierarchy, combining redundant slides, and translating a full deck.

  Each one tests a different capability of AI #presentation tools.

