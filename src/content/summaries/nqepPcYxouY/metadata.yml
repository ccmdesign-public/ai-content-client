title: "Claude Code to Figma: Is Taste the Only Skill That Matters Now?"
description: |-
  This week's briefing covers the biggest stories in product and AI — from Anthropic and Figma's game-changing Claude Code integration to Pinterest's internal war over its AI strategy, plus fresh data on which AI models are winning in the enterprise.

  We dive into whether "taste" is becoming the most valuable skill in product development, why Shopify's CEO is now shipping 10x more code, and what new data from Ramp reveals about how businesses are adopting AI in 2026.

  ➡️ Get more news, analysis on tutorials on Substack: https://departmentofproduct.substack.com/ 

  As always - let me know what you think about any of the things I've covered in the comments below.

