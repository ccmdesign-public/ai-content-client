title: Cursor Composer 2 + Cursor Glass in 10 Minutes
description: >-
  Cursor has released Composer 2 and a faster, 3x-cost Composer 2 Fast, along
  with a new UI called Cursor Glass. The video covers pricing, compares speed to
  GP 4 Fast and Opus 4.6 Fast, and notes a Terminal Bench 2.0 score of 61.7%
  (above Opus 4.6 at 58% and below GPD 5.4 at 75.1%). A demo shows the Glass
  interface’s Codex-like agent sessions, project threads, and a marketplace of
  plugins, plus a Shift+Tab planning mode that asks clarifying questions and
  produces a rich plan with tech stack tables, a mermaid architecture diagram,
  and to-dos. The model rapidly generates a neo-brutalist MDX blog, then
  overhauls the homepage into a colorful SaaS landing page while maintaining
  blog functionality and good color contrast. The video highlights integrated
  browser/terminal, file and task views, first-party Git support with one-click
  commit/push to GitHub, agent filtering for multi-agent control, and concludes
  that the new UI reduces clutter and improves workflow.


