  Background Agents

  3:02 IDE & UI Polish — VS Code PATH Fix, Not Responding Spinner, Input Restore

  3:25 Update Now — claude update, 75K+ GitHub Stars


  Key Changes in These Releases:

  - Enterprise: --bare flag for scripted -p calls strips hooks/LSP/plugins,
  managed-settings.d/ drop-in directory for team policy fragments,
  sandbox.failIfUnavailable exits with error instead of running unprotected

  - Hooks: CwdChanged and FileChanged events for reactive environment management
  (direnv), agent initialPrompt frontmatter for auto-submitting first turn

  - Channels: --channels permission relay forwards tool approval prompts to your
  phone, Remote Control sessions generate AI titles within seconds

  - Performance: Bedrock SDK cold-start latency reduced, claude -p startup
  ~600ms faster, non-streaming fallback 21K→64K tokens with 5-minute timeout

  - Voice: 6 fixes including silent retry failures, WebSocket recovery, 1-8s UI
  freeze on startup, Linux ALSA errors, SoX on Termux/Android


