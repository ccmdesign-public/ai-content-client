title: 92 Updates in Two Releases? Here's What Actually Matters!
description: >-
  This video details a significant claude code software update, introducing 12
  new features, 52 bug fixes, and 28 improvements. Key enhancements include
  enterprise security with bare repo configuration and improved GitHub team
  access, alongside MCP execution in sandboxes. These changes aim to improve the
  developer experience and influence the future of work by streamlining
