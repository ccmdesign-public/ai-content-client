  This month, we’ve introduced 16 major updates across Ahrefs!

  Here are the Ahrefs tools receiving key upgrades for October:

  ► MCP Server
  ► Brand Radar
  ► Web Analytics
  ► Site Explorer
  ► Google Search Console reports
  ► Social Media Manager
  ► Ahrefs API

  These tools gained powerful new features, including remote MCP access for connecting AI assistants like ChatGPT and Claude to live Ahrefs data, smarter entity and URL tracking in Brand Radar, improved navigation and filtering in Web Analytics, and deeper keyword and branded traffic insights in Site Explorer. You’ll also find direct SERP previews in GSC reports, multi-channel publishing in Social Media Manager, and new spam filters plus expanded endpoints in the API.

  Explore the latest updates designed to make your analysis faster, your reports cleaner, and your workflows smarter.

