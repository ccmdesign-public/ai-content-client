title: OpenAI’s Engineers Just Cloned this Major SaaS Product
description: |-
  OpenAI's engineers have been quietly building their own in-house alternative to GitHub. We unpack what triggered it, what it means for SaaS, and why this could be the beginning of a major new playbook for tech companies.

  ➡️ Get more news, analysis and tutorials on Substack: https://departmentofproduct.substack.com/
  ➡️ WebMCP Explained https://departmentofproduct.substack.com/p/webmcp-explained-for-product-teams

  This week's briefing also covers: how Google's AI Overviews are devastating traffic to tech publications, why Anthropic came out on top after the political fallout with the US government, and why a new Figma challenger is trending as one of the fastest growing SaaS companies in the US right now.

  As always - let me know what you think about anything we've covered in this week's Briefing by dropping a comment below!

