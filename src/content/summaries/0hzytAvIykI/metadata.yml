title: A Gen Z mudou tudo? O choque de gerações no trabalho em 2026 | Bingo
  Corporativo
description: >-
  A Gen Z mudou tudo — ou fomos nós que demoramos para entender?

  Neste episódio do Bingo Corporativo, falamos sobre choque de gerações,
  trabalho, liderança e o que realmente mudou nas relações profissionais nos
  últimos anos.


  Uma conversa honesta sobre erros, aprendizados e o recomeço do mundo
  corporativo em 2026.


  Durante anos, foi fácil apontar o dedo para a Gen Z:

  “não quer trabalhar”, “não aguenta pressão”, “não veste a camisa”.


  Mas e se o problema não fosse eles?


  Neste episódio, Alexandre Abramo, Shapoka e Salomão fazem uma autocrítica
  geracional e discutem como a chegada da Gen Z expôs falhas profundas do modelo
  tradicional de trabalho, liderança e carreira.


  Falamos sobre:


  choque de gerações no ambiente corporativo


  expectativas irreais sobre trabalho e sucesso


  saúde mental, propósito e limites


  por que 2026 exige um recomeço, não nostalgia


  o que líderes precisam desaprender para continuar relevantes


  Não é um ataque à Gen Z.

  É um convite à reflexão.


  💬 Você acha que a Gen Z mudou tudo ou apenas acelerou mudanças que já eram
  inevitáveis?

  Comenta aqui e entra no debate.


  Acompanhe a nova temporada, com quadros novos e os mesmos idiotas de sempre.


  BINGO CORPORATIVO | Podcast sobre Trabalho, Carreira e Vida Real


  O Bingo Corporativo é um podcast sobre mundo corporativo, carreira, trabalho,
  liderança e vida profissional real — sem frases prontas, sem autoajuda vazia e
  sem romantizar o escritório.


  Aqui, Abramo, Shapoca e Salomão discutem, com bom humor e senso crítico, os
  temas que realmente impactam quem trabalha em empresas, startups, grandes
  corporações ou lidera times:


  👉 gestão de pessoas

  👉 liderança na prática

  👉 cultura organizacional

  👉 carreira e desenvolvimento profissional

  👉 produtividade (sem papo tóxico)

  👉 conflitos no trabalho

  👉 demissões, promoções e bastidores corporativos

  👉 soft skills, hard skills e habilidades humanas

  👉 política corporativa, ego e poder

  👉 erros de gestão que ninguém assume

  👉 tendências do mercado de trabalho

  👉 histórias reais do dia a dia profissional


  O Bingo Corporativo não é um podcast motivacional.

  É um espaço de conversa honesta sobre como o trabalho realmente funciona — com
  ironia, experiência prática e reflexões que ajudam você a pensar melhor suas
  decisões profissionais.


  🎯 Para quem é este canal?


  Profissionais em início, meio ou transição de carreira


  Líderes, gestores e futuros líderes


  Pessoas que trabalham em empresas, startups ou ambientes corporativos


  Quem quer crescer profissionalmente sem cair em clichês de LinkedIn


  📌 Temas recorrentes no canal:

  podcast corporativo, podcast sobre carreira, podcast sobre liderança, mundo
  corporativo, vida profissional, gestão de pessoas, trabalho em equipe, cultura
  organizacional, produtividade, soft skills, desenvolvimento profissional,
  mercado de trabalho, liderança tóxica, crescimento na carreira.


