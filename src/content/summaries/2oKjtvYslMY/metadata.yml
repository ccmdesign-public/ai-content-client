title: Stable diffusion dreams of steampunk brains
description: >-
  Prompt: "ultrarealistic steam punk neural network machine in the shape of a
  brain, placed on a pedestal, covered with neurons made of gears. dramatic
  lighting. #unrealengine"

  Stable diffusion takes a noise vector as input and samples an image. To create
  this video I smoothly (spherically) interpolate between randomly chosen noise
  vectors and render frames along the way.


  This video was produced by one A100 GPU dreaming about the prompt overnight
  (~8 hours). While I slept and dreamt about other things.


  This is version 2 video of this prompt, with (I think?) a bit higher quality
  and trippy AGI music.


  Music: Wonders by JVNA


