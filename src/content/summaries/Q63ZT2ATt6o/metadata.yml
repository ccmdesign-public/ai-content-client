title: Codex with GPT-5.4 Is Actually Good Now
description: >-
  Codex paired with GPT-5.4 is a really good agent. The new Codex app is better
  than the original Codex CLI and Codex Extension, it adds skills, automations,
  MCP toggles, and is now fully supported by GSD, making it a real competitor,
  if not collaborator to Claude Code. 


  In this video, I cover the Codex CLI vs the new Codex app, how to add MCP
  servers, skills, and why GSD project portability between Claude Code and Codex
  is a huge unlock. If you've been sleeping on Codex, it's worth another look.


