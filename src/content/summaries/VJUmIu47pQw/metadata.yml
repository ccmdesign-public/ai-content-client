title: 77% Pedem Demissão Por Causa do Chefe — Será Que o Problema É Seu Líder?
description: >-
  Chefe ruim existe — ou todo mundo só gosta de reclamar do chefe?


  Neste episódio do Bingo Corporativo, debatemos o impacto real da liderança na
  carreira, na motivação e na decisão de pedir demissão.


  Dados recentes mostram que:

  📊 70% do engajamento de um time é influenciado pelo gestor

  📊 Até 77% dos pedidos de demissão envolvem problemas com liderança


  Mas será que o problema é sempre o chefe?


  Falamos sobre:


  Chefe difícil vs. chefe ruim


  Liderança tóxica e politicagem corporativa


  O perigo do líder que só pensa na promoção


  Admiração vs. concordância


  Confiança e identificação como fatores de retenção


  Soft skills e a nova geração de líderes


  Se você já quis pedir demissão por causa do seu gestor — ou é líder e quer
  entender por que as pessoas saem — este episódio vai te provocar.


  👇 Comenta aqui:

  Você já pediu demissão por causa de um chefe?


  🔔 Inscreva-se no canal

  👍 Deixe seu like

  🎧 Ouça também no Spotify


  Sobre o Bingo Corporativo


  O Bingo Corporativo é um podcast sobre liderança, carreira e mundo corporativo
  apresentado por Alexandre Abramo, Segio "Shapoka" Gomes e Alexandre Salomão
  Federman. Toda semana discutimos temas como chefe ruim, gestão de pessoas,
  cultura organizacional, demissão, retenção de talentos, liderança tóxica, soft
  skills, produtividade, crescimento profissional e os bastidores das empresas.


  Falamos sobre política corporativa, conflitos no trabalho, desenvolvimento de
  líderes, geração no mercado de trabalho e os erros e acertos da vida
  executiva.


  Se você quer entender como funciona o jogo corporativo — e como crescer nele —
  este podcast é para você.
