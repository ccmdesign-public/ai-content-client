title: Well, I Didn’t See That Coming! with KARDO AYOUB — SmashingConf Freiburg 2025
description: >-
  Join us for a fun, light-hearted, and eye-opening (pun intended!) journey
  through the world of design, as Kardo shares his personal story of becoming a
  visually impaired designer. He'll be talking about what it's like to navigate
  the design world with a vision impairment, how it's transformed the way he
  thinks about design and accessibility, and why inclusive design isn't just
  important — it's essential.


  Expect real-life insights, some humorous stories, and practical tips to help
  you rethink the way you approach design. Whether you're a seasoned designer or
  just curious about how to make your products more user-friendly, this talk
  will inspire you to see the world of design differently. You'll no doubt walk
  away with a fresh perspective on how good design can make a huge impact for
  everyone — whether they have 20/20 vision or not! Don't miss out-let's make
  the world more inclusive, one design at a time.
