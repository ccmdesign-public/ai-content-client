title: Claude Code Loops in 7 Minutes
description: >-
  Claude Code “Loop” Scheduling: Recurring AI Tasks in Your Session


  The script explains Claude Code’s new “Loop” feature (an evolution of the
  Ralph Wiggins technique) for running recurring prompts that help verify work
  and prevent premature task completion. Loop can schedule tasks for up to three
  days using natural language or a /loop command, with a minimum one-minute
  interval, and it shows the scheduled prompt, notes, and auto-expiry. Examples
  include looping over PRs to fix build issues, summarizing tagged Slack posts
  via MCP, creating daily Git history recaps saved to the desktop, and scraping
  Hacker News with Firecrawl then emailing summaries via a connected Gmail CLI
  skill. Loops are scoped to the active Claude Code session and stop when the
  session closes, include up to a 10% scheduling offset to avoid synchronized
  API spikes, and can be disabled via a flag; for durable scheduling, the script
  suggests the desktop app feature or GitHub Actions.



