title: AI Agents Are Dangerous Without This | Gemini CLI
description: >-
  🚀 FIXING AI CODING WITH HOOKS, SKILLS & PLAN MODE | Gemini CLI Advanced
  Features


  AI coding agents are powerful, but they often make critical mistakes like
  hard-coding passwords, ignoring design systems, or starting to code without
  planning. In this tutorial, I'll show you three advanced features in Gemini
  CLI that solve these problems and make your AI agent truly enterprise-ready.


  🔥 What You'll Learn:

  • Hooks - Automated scripts that enforce rules at critical moments (like
  blocking hard-coded secrets)

  • Skills - Reusable knowledge files that teach the agent specialized tasks
  (brand guidelines, 3D web experiences)

  • Plan Mode - Forces the agent to think and create a plan before writing any
  code


  These features transform Gemini CLI from a simple chatbot into a
  deterministic, enterprise-grade development tool that follows YOUR rules every
  single time.


  📋 CHAPTERS:


  0:00 - Introduction: The Problem with AI Coding Agents

  0:48 - Three Key Features of Gemini CLI

  0:55 - Feature 1: Hooks (Automated Scripts)

  1:17 - Feature 2: Skills (Specialized Knowledge)

  1:38 - Feature 3: Plan Mode (Think Before Coding)

  2:10 - Demo: Project Setup Overview

  2:34 - Demo: Exploring Hooks Configuration

  3:25 - Demo: Exploring Skills

  4:41 - Demo: Secret Scanner Hook in Action

  5:22 - Demo: Plan Mode in Action

  6:49 - Results: 3D Experience Added

  7:49 - Recap: Why These Features Matter

  8:09 - Closing


  ⚡ Key Takeaways:

  • Hooks run automatically at specific moments to enforce security and
  standards

  • Skills eliminate repetitive explanations by installing reusable knowledge

  • Plan Mode creates a collaborative workflow where the agent thinks before
  acting

  • Perfect for team environments and enterprise development


  💡 Tools Mentioned:

  • Gemini CLI - Google's AI coding agent

  • Spline - 3D web component library

  • Custom brand guidelines skill

  • Secret scanner hook


