  It feels like every day there's a new open source GitHub repo changing the way
  we use Claude Code. So to cut through the noise, in this video I'm breaking
  down 5 of my favorite open source repos that all came out this month. We start
  with Karpathy's AutoResearch - the hottest repo on GitHub right now - and I
  give you the honest breakdown of what it can actually do versus what people
  are overhyping it for (hint: if a machine can't score it with a yes or no, the
  loop is just vibes). Then we get into OpenSpace, CLI-Anything, Claude Peers
  MCP, and Google Workspace CLI - all of which integrate with Claude Code and
  all launched in March 2026.


  ---


  Repos talked about in this video:


  AutoResearch - https://github.com/karpathy/autoresearch

  OpenSpace - https://github.com/HKUDS/OpenSpace

  CLI-Anything - https://github.com/HKUDS/CLI-Anything

  Claude Peers MCP - https://github.com/louislva/claude-peers-mcp

  Google Workspace CLI - https://github.com/googleworkspace/cli


