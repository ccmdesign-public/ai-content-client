title: "New in Jan ‘25: Web Analytics additions, share of voice charts and more"
description: >-
  Catch up on Ahrefs’ latest features and improvements in January 2025.


  ***************************************

  Additional Resources


  Web Analytics ► https://ahrefs.com/web-analytics


  Rank Tracker ► https://ahrefs.com/rank-tracker


  Site Explorer ► https://ahrefs.com/site-explorer


  What are Project Boost add-ons? ►
  https://help.ahrefs.com/en/articles/10130957-what-are-project-boost-add-ons


  Canny for feature requests ► https://ahrefs.canny.io/


  ***************************************

  This month we have six noteworthy updates to share with you.


  Let’s start with Web Analytics. We have three new features here:


  ► Integration with Google Search Console.

  ► Visitor browser language insights 

  ► Access to HTML and text history for pages directly through Page Inspect.


  Moving on to Site Explorer. The Organic keywords report now features a
  position chart that shows keyword distribution by position over time.


  Next up is Rank Tracker. Here we have the following:


  ► New Share of Voice and Share of Traffic Value metrics and charts are
  available in Dashboard, Overview, and Competitors Overview.

  ► A keywords history chart with position groups added to the GSC Overview
  report.

  ► Also, the GSC Overview report now includes a page history chart.


  Finally, on to a general update. You can now purchase Project Boost add-ons
  for all verified projects, including those on the free Ahrefs Webmaster Tools
  plan.


