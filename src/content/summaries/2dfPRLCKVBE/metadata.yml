title: What is a Pod in Kubernetes? (K8s Basics Explained)
description: >-
  What is a pod in Kubernetes? It is the smallest deployable object in K8s,
  acting as a wrapper around your containers. In this quick tutorial, we cover
  the one-to-one relationship between pods and applications, how to scale by
  adding more pods (not containers), and how to deploy your first pod using the
  kubectl run command.


  Watch the full Kubernetes course here 👆


