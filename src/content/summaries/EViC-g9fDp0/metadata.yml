title: 5 New AI Models That Are Smarter (and Cheaper) Than GPT-5
description: >-
  *Get our AI news cheat sheet: 20+ prompts for the latest models and tools*
  https://clickhubspot.com/wba


  Episode 98: Is 2026 shaping up to be the year AI agents become
  indispensable—and outpace GPT-5? Hosts Matt Wolfe (https://x.com/mreflow) and
  Joe Fier (linkedin.com/in/joefier) break down the explosion of new AI models,
  including Claude Sonnet 4.6, Gemini 3.1 Pro, and Grok 4.2, and explore how
  these tools are not only smarter but also significantly cheaper than previous
  state-of-the-art language models.

  This episode dives deep into the rise of agentic AI, the OpenClaw origin
  story, and how companies like Meta and ElevenLabs are racing to create
  integrated, emotionally-aware AI agents. Matt and Joe discuss the rapid
  democratization of AI, the impact of these advances on creativity and business
  operations, and the ongoing debate about slowing down AI before it accelerates
  beyond human control. Plus: practical demos, business tips, and a look at the
  hardware/software divide in global robotics.


  Check out The Next Wave Podcast if you’re on the go and want to listen to the
  show: https://lnk.to/thenextwaveyt


