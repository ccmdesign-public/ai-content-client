title: Deploying a Multi-Tier App on Kubernetes
description: >-
  In this demo, a fully functional multi-tier voting application is deployed on
  a Kubernetes cluster using Minikube. The vote flows from the frontend through
  Redis, the worker pod, PostgreSQL, and all the way to the result app — live
  and working. This is Kubernetes handling a real-world app end to end. 


