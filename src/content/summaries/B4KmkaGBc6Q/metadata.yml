title: Kubernetes YAML File Structure Explained
description: >-
  Every Kubernetes object — pods, ReplicaSets, deployments, services — is
  created using a YAML definition file. All of them share the same four required
  top-level fields: apiVersion, kind, metadata, and spec. Get the structure
  right and Kubernetes does exactly what you tell it. Get the indentation wrong
  and it all falls apart. This clip breaks it down clearly so you can write your
  first K8s YAML without errors.


