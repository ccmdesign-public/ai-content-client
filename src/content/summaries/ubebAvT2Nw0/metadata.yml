title: "Google Workspace CLI: 100+ AI Agent Skills — Here's What They Do"
description: >-
  Google just launched a game-changing CLI tool that lets you automate Google
  Workspace directly—no Zapier, no N8N, just pure first-party integration!


  In this video, I dive into Google Workspace CLI (GWS), an open-source tool
  that gives AI agents and developers direct access to Gmail, Calendar, Drive,
  Sheets, Slides, and more. With over 100+ prebuilt skills, recipes, and
  personas, you can automate workflows like creating meetings, processing
  emails, and generating documents—all from your terminal.


  I'll show you two live demos:

  ✅ Creating a Google Meet and emailing the link automatically

  ✅ Processing 10 emails and generating Sheets, Docs, and Slides in one prompt


  Plus, a complete installation walkthrough so you can start using it today!


