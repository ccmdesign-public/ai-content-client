  This month, we’ve introduced 18 major updates across Ahrefs!


  Here are the Ahrefs tools receiving key upgrades for September:


  ► Brand Radar

  ► Report Builder

  ► Web Analytics

  ► Site Explorer

  ► Keywords Explorer

  ► Rank Tracker

  ► Batch Analysis

  ► API


  These tools gained powerful new features, including entity tracking and topic
  grouping in Brand Radar, improved trend and performance insights in Web
  Analytics and Site Explorer, richer competitor data in Keywords Explorer, key
  enhancements in Batch Analysis 2.0, and many more.


