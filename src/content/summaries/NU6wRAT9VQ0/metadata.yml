title: A Primer on Using Agent Skills
description: >-
  Agent skills are modular folders of instructions, scripts, and assets enabling
  progressive disclosure so agents load precise knowledge only when needed.
  Anthropic's Claude Code taxonomy groups skills into data fetching, business
  automation, code quality, verification, and incident runbooks while
  emphasizing gotchas, small skill bodies, and filesystem-style packaging. Skill
  Creator adds testing, benchmarking, and auto-description tuning to preserve
  trigger reliability across model updates and to distinguish capability uplifts
  from encoded-preference workflows.


