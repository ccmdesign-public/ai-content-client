title: How I Use Obsidian + Claude Code to Run My Life
description: >-
  I sit down with my dear friend Vin (Internet Vin) for a deep, hands-on
  walkthrough of how he uses Obsidian and Claude Code together as a thinking
  partner, idea generator, and personal operating system. Vin demonstrates live
  how Claude Code can read, reference, and surface patterns across an entire
  Obsidian vault of interlinked markdown files — turning years of personal notes
  into actionable insights, project ideas, and even custom commands. This
  episode covers everything from the basic setup to advanced workflows like
  tracing how ideas evolve over time, generating contextual startup ideas, and
  delegating tasks to autonomous agents. If you are serious about getting the
  most out of LLMs, this is the episode that shows you how your own writing
  becomes the fuel.


  Link to Vin's skills and my notes:
  https://startup-ideas-pod.link/obsidian-commands


