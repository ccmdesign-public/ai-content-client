title: GPT-5.4 First Test Results
description: >-
  OpenAI's GPT-5.4 consolidates advances in reasoning, coding, and agentic
  workflows while adding a 1 million-token context window and native
  desktop/computer-use capabilities. Benchmarks show major gains for
  professional knowledge work and automation: faster, more token-efficient
  reasoning; improved tool calling via toolsearch; and desktop navigation with
  higher accuracy than human baselines. Real-world testing highlights
  exceptional coding and long-form writing abilities alongside persistent issues
  in frontend taste, excessive verbosity, and occasional premature task
  completion.


