  🛠 Key Details


  Auto-Memory (v2.1.59):

  - Claude automatically saves useful context to auto-memory as you work

  - Project patterns, debugging insights, and workflow preferences persisted
  across sessions

  - New /memory command gives full control to review, edit, and remove saved
  entries


  Developer Experience:

  - /copy — shows interactive picker when code blocks are present, select
  individual blocks or full response

  - Compound bash commands (e.g. cd /tmp && git fetch && git push) now get
  smarter per-subcommand "always allow" prefixes

  - Improved ordering of short task lists


  Bug Fixes & Reliability:

  - MCP OAuth token refresh race condition fixed — no more auth failures with
  multiple Claude Code instances

  - Shell commands show clear error message when working directory has been
  deleted

  - Remote Control expanded to more users (v2.1.58)

  - Multi-agent sessions release completed subagent task state — improved memory
  usage


