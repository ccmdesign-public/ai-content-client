title: "Azure DevOps Engineer Exam: Question 8"
description: >-
  Reproducible Pipelines: No Agent Secrets! 🚀 


  The Goal: Build a pipeline that is auditable and reproducible without relying
  on an agent's "local state."


  The Solution: Artifacts + Git 🎯

  - The Win: Store build artifacts in Azure Artifacts and version everything in
  Git.

  - Why it works: It removes ""hidden states."" If an agent is deleted, your
  process isn't lost. Anyone can inspect Git and Azure Artifacts to see exactly
  what was deployed.

  - Avoid the Traps: Never rely on local disks or undocumented tools—they kill
  transparency and auditability.


  Exam Tip: For AZ-400, "Reproducible/Auditable" = Version Control + Remote
  Artifact Storage. 🚀


