title: AWS AI Practitioner Question 31
description: >-
  AWS AI: Smart Data Labeling! 💸 #shorts


  Scenario: You need to label 100,000 reviews as positive, negative, or neutral
  while keeping costs low and accuracy high.


  The Winner: Amazon SageMaker Ground Truth 🎯


  - The Logic: It uses Active Learning to automatically label high-confidence
  reviews. Only the "tricky" ones are sent to human reviewers.


  - The Win: This automated workflow can slash your labeling costs by up to 70%.


  Why not others? Amazon Rekognition is for images only, Mechanical Turk lacks
  built-in ML automation, and Amazon Comprehend requires you to already have
  labeled data to train a custom model.


  Exam Tip: For "Data Labeling + Cost Optimization," the answer is always
  SageMaker Ground Truth. 🚀


