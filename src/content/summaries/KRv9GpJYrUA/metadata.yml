title: Building Is the Easy Part Now | Mike Krieger on What AI Changed
description: >-
  Mike Krieger built one of the most consequential consumer apps of the last two
  decades as cofounder of Instagram. He is now at the frontier of determining
  what makes a breakout AI-native product as co-lead of Anthropic Labs.

  Dan Shipper talked with Krieger for Every’s AI & I about how his experience
  creating Instagram shapes how he thinks about building with AI, including what
  can be sped up and what remains stubbornly time-intensive. 

