title: Are 40% Staff Cuts the New AI Normal?
description: >-
  Jack Dorsey's announcement of a 40% workforce reduction at Block ignited
  debate over whether AI enabled the cuts or whether overhiring and managerial
  choices were the main drivers. Block's stock jumped more than 25% while
  critics warned against treating AI as a scapegoat and predicted copycat
  layoffs. Broader discussion focuses on the tension between immediate
  efficiency gains and longer-term job transformation, with urgent calls for
  retraining and strategic adaptation as markets reprice around AI.


