title: How We Use Proof, a Collaborative Editor for Humans and AI
description: >-
  Every has unveiled a new product, built by CEO Dan Shipper. It's called Proof,
  a free, open-source, live collaborative document editor built for humans and
  AI agents to work in together. 


  Proof started as a Mac app designed to show the provenance of AI-written
  text—purple for AI, green for human. But when Shipper rebuilt it as a web app
  with real-time collaboration, something clicked. Suddenly, everyone at Every
  was using it for everything from planning docs, to creative writing and even
  daily to-do lists. The team realized they needed a lightweight space where
  their OpenClaw agents and humans could co-author documents and leave
  comments. 


  In this special episode, Shipper is joined by Every chief operating officer
  Brandon Gell, Cora general manager Kieran Klaassen, and head of growth Austin
  Tedesco to demo Proof live and share how it's changed the way they work.
  Brandon walks through a loop where his Codex agent writes a plan, Dan's
  personal Claw R2-C2 reviews it, and the humans just steer. Austin explains how
  he uses Proof to write a weekly food newsletter, texting ideas to his Claw on
  runs and watching an outline take shape. And Kieran makes the case that
  Proof's power is its lightness—just a link you can hand to any agent or
  colleague.


  The conversation covers what "agent native" means in practice, why AX (agent
  experience) matters as much as UX (user experience), what happens when 10
  agents edit one document at the same time, and why some writing is now better
  read by an AI than a human.

