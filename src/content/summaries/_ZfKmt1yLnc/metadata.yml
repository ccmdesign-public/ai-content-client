  Key Concepts

  - apt install cuda / apt install rocm: First time ever on base Ubuntu.
  Auto-detects GPU, pulls correct driver version, 15-year security maintenance.
  No PPAs, no version conflicts.

  - Inference Snaps: Confined snap packages bundling AI model + inference engine
  + silicon-optimized runtime. Hardware auto-detection (NVIDIA CUDA, AMD ROCm,
  CPU fallback). OpenAI-compatible localhost API. Models at launch: Qwen VL,
  DeepSeek R1, Gemma 3, Nemotron 3 Nano.

  - LXD Agent Sandboxing: Pre-installed on every Ubuntu machine. 6-line script
  creates isolated containers. Bind-mount project directory only. 3-4 second
  boot from cache. Container or VM with one flag change.

  - YubiKey-Gated Commits: Agent codes freely inside sandbox, but commits
  require hardware key tap. AI assistance with human accountability.

  - LTS Anything: Bring any Docker container, Canonical patches all dependencies
  for 15 years. Thousands of Python packages, tens of thousands of Node modules.


