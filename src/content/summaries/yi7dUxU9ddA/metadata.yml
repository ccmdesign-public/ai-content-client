title: O ano no Brasil tem só 8 meses? Carnaval, Copa e produtividade em 2026
description: >-
  Neste episódio do Bingo Corporativo, discutimos o calendário brasileiro real:

  Carnaval, feriados emendados, Copa do Mundo, eleição, Black Friday e como tudo
  isso impacta produtividade, gestão de pessoas e cultura nas empresas.


  Falamos sobre:


  Por que trabalhar bem em janeiro virou diferencial


  Carnaval é feriado ou a gente só finge que é?


  Banco de horas, emendas e a hipocrisia corporativa


  Copa do Mundo ajuda ou atrapalha o trabalho?


  Eleição dentro da empresa: até onde vai?


  Feriados demais atrapalham ou movimentam a economia?


  Tudo isso com o olhar crítico (e bem-humorado) de quem vive o corporativo na
  prática, sem romantizar produtividade tóxica nem passar pano para preguiça
  institucionalizada.


  🎙️ Participam do episódio:

  Alexandre Abramo, Shapoka e Salomão


  📌 Se você trabalha em empresa, lidera time ou simplesmente sente que o ano
  nunca engrena… esse episódio é pra você.
