title: Google Workspace biggest UPDATE - GEMINI NOW Works EVERYWHERE
description: >-
  Gemini in Google Workspace just received a major upgrade — and it's no longer
  just a chatbot sitting in a side panel. It's now a full-blown AI agent with
  access to your tools, your Gmail, your Drive, your Docs, Sheets, Slides, and
  the web. In this video, I put it through real-world tests across three
  different scenarios to show you exactly what it can do.


  Here's what's new:

  ✅ Google Sheets – Describe what you need and Gemini builds entire
  spreadsheets, tables, charts, and dashboards — Google says 9x faster than
  doing it manually.

  ✅ Google Docs – The new "Help Me Create" experience pulls from your emails and
  Drive to generate a fully formatted first draft, with style matching.

  ✅ Google Slides – Generate fully editable slides that match your existing deck
  theme, all from a single prompt.

  ✅ Google Drive – Ask Gemini questions across all your documents, emails, and
  calendar like a personal search engine over your entire digital life.

  ✅ Cross-App Collaboration – The biggest upgrade: Gemini can now work across
  all Workspace apps simultaneously to give you one cohesive output.


  I tested all of this live — building an expense tracker dashboard from Gmail
  receipts, creating an executive slide from a Drive PDF, and generating a full
  travel itinerary from scattered emails and calendar invites. The results are
  impressive.


  🔔 Subscribe for more videos on AI tools, Google Workspace, and productivity.


  📌 All opinions are my own and do not belong to my employer.


  Check your subscription level — this appears to be rolling out to Google Pro
  and Ultra subscribers first. Drop your questions in the comments — I read and
  respond to all of them!


