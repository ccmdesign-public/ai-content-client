title: Opal's Agent Platform Update Is a Game-Changer (Here's Why)
description: >-
  Opal's MASSIVE Update: 4 Game-Changing Features Explained


  Google Labs just dropped a huge upgrade to Opal, their no-code AI app builder,
  and it completely changes the game. In this video, I break down the four major
  updates and show you how to build a sophisticated client meeting prep app
  using just ONE prompt.


  What's New in Opal:


  ✅ Agent Step - No more manual model selection. The AI agent now analyzes your
  goals and picks the best tools automatically.


  ✅ Memory - Your Opals remember your preferences, brand style, and past
  interactions across sessions. The more you use it, the smarter it gets.


  ✅ Dynamic Routing - Route different users down different paths based on logic
  (new clients vs. existing clients, for example).


  ✅ Interactive Chat - The agent can now pause mid-workflow to ask clarifying
  questions before proceeding.


  What I Built:

  A complete client meeting prep app that:


  Asks about the client and meeting purpose

  Routes differently for new vs. existing clients

  Researches company profiles automatically

  Generates an interactive HTML briefing with company overview, key people,
  talking points, and recent news

  Creates a video summary of the research

  All of this from a single prompt. No code required.


  My Takeaway:

  The workflow is dramatically simpler. What used to require 10-15 connected
  nodes now happens automatically through agent mode. While the output quality
  still needs some refinement (especially video generation and HTML polish), the
  direction is clear: Opal is evolving from a simple workflow builder into a
  full-fledged agent platform.


