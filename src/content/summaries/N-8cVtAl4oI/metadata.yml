title: "Claude Code: NEW Remote Control, Auto Memory, Plugins & More"
description: |-
  Anthropic's Big Claude Code & Cowork Update: Remote Control, Scheduled Tasks, Plugins, Auto Memory + New Simplify/Batch Skills

  The script recaps a consolidated update on new Anthropic releases across Claude Code and Cowork, including Remote Control to access a computer session from a phone or web app via a slash command, and Scheduled Tasks in Cowork for recurring workflows like summaries, research, file organization, and email follow-ups. It highlights two new plugin repos—knowledge work and financial services—installable from a marketplace and editable in natural language, with examples like equity research idea generation. The video also covers Claude Code's new Auto Memory that remembers project context across sessions via an editable markdown file, improvements to the Ask User Question tool to show markdown diagrams and code snippets, and mentions usage stats claiming 4% of GitHub public commits are authored by Claude Code with a projection to 20% by end of 2026. Finally, it previews upcoming Simplify and Batch skills using parallel, isolated agents and worktrees.

