title: "New in Feb ‘25: Batch AI in Site Audit, Competitive map in Report
  Builder and more"
description: >-
  Explore the latest Ahrefs updates for February 2025.


  ***************************************

  Additional Resources


  Web Analytics ► https://ahrefs.com/web-analytics


  AI Content Helper ► https://app.ahrefs.com/content-helper


  Site Explorer ► https://ahrefs.com/site-explorer


  Rank Tracker ► https://ahrefs.com/rank-tracker


  Site Audit ► https://ahrefs.com/site-audit



  Canny for feature requests ► https://ahrefs.canny.io/


  ***************************************

  This month we have 7 tool updates, and several general updates for you.


  Let’s start with Web Analytics. Here we have the following features:


  ► Group traffic sources by acquisition channel.

  ► Improved filters to offer suggestions and let you combine OR/AND rules.

  ► Time zone customization for accuracy

  ► Improved regional comparing.


  Moving on to AI Content Helper. A new chat function was added to help you
  refine content for both humans and search engines.


  Next, Report Builder. Here you can build a competitive map by selecting
  competitors and comparing backlink, organic, and paid metrics across three
  axes.


  Moving on to Site Explorer. Here we’ve added organic positions to the Paid
  keywords report.


  In Site Audit, we have launched the Batch AI feature that lets you generate
  titles and meta descriptions in bulk.


  Moving on to Rank Tracker. The new Locations mode in the history chart in the
  Overview report lets you track performance across different locations.


  Finally, the GSC Overview report now includes year-over-year performance for
  both organic positions and pages.


