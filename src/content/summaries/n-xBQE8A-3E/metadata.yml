title: How a 17-Year-Old Is Learning in the Age of AI
description: >-
  Depending on whom you ask, AI is either the best or worst thing that can
  happen to the next generation. The arguments come from educators, venture
  capitalists, op-ed writers, and anxious parents—but rarely from the young
  people in question. 


  On this episode of AI & I, Dan Shipper sat down with one: Alex Mathew, a
  17-year-old high-school senior at Alpha High School in Austin, Texas. 


  Alpha School, a rapidly expanding network of kindergarten through grade 12
  private schools, is not without controversy. Inside Alpha High School, there
  are no traditional teachers, all academic content is delivered through an
  AI-powered platform, and the adults in the classroom, known as “guides,” focus
  solely on supporting the students emotionally and keeping them motivated to
  learn. The students have two- to three-hour learning blocks every morning and
  spend the rest of the day going deep on a project in an area they care about,
  spanning art, sport, life skills, and entrepreneurship.


  Mathew’s project is a startup called Berry, built around an AI stuffed animal
  designed to help teenagers with their mental health. His vision is for teens
  to talk to the plushie for five to 10 minutes a day and, in the process, learn
  to recognize and cope with their problems in the right way. In this episode,
  Dan and Mathew talk about what a day at Alpha High looks like, what keeps
  students from cheating when AI is everywhere, and how Generation Z—people born
  between 1997–2012—really feels about college, social media, and books.  


