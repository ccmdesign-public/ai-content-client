  Paperclip just hit 23K GitHub stars in 12 days -- and it is promising something wild: open-source "zero-human companies" powered entirely by AI agents. You create an org chart, assign roles like CEO, CTO, and Engineer to AI agents (including Claude Code), set budgets, and let them run. 

  But is this actually useful, or are we just watching AI agents run in circles? In this video, I give you an honest verdict on whether AI agent orchestration layers are the future -- or pure performance theater.

