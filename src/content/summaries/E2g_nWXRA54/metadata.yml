title: How OpenAI Scaled ChatGPT to 800 Million Users with ONE Postgres Database
description: >-
  800 million users. One database. No panic. 🤯


  Most companies would have rewritten their entire backend by now. OpenAI
  didn't. Instead, they mastered every single step of scaling ChatGPT  from read
  replicas to cache locking to PgBouncer connection pooling and only added
  complexity when absolutely necessary.


  This is the story of how OpenAI built one of the most disciplined database
  architectures in tech history, and what you can learn from it as an engineer
  or architect.


