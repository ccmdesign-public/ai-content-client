title: "Zero XSS, Zero Hallucinations: JSON Render's Bold Take on Generative UI"
description: >-
  json-render by Vercel Labs — the open-source Generative UI framework with
  11,700 GitHub stars that lets AI generate validated JSON specs instead of raw
  React code. No XSS vectors, no hallucinated components, no broken props. 14
  packages, 7 rendering platforms, 1 JSON spec. This deep dive covers the
  Catalog Pattern, JSONL streaming with RFC 6902, computed expressions, state
  adapters (Zustand, Redux, Jotai, XState), and how json-render competes against
  Google A2UI, AG-UI, and Open-JSON-UI.


