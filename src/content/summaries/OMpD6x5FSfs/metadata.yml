title: "AI agent adoption: From scientists to CFOs"
description: >-
  Unlock new value with trusted, autonomous AI, talk with your rep for
  attendance options Think 2026 – May 4-7 in Boston → https://ibm.biz/BdpMzG  


  From GPT-2 chatbot to GPT-5.3! In this milestone 100th episode of Mixture of
  Experts, host Tim Hwang is joined by Ritika Gunnar, Volkmar Uhlig and Kaoutar
  El Maghraoui, to explore how AI has evolved since episode 1. First, a
  homeowner uses ChatGPT to sell his house over realtor estimates—sparking
  debate about AI democratizing expertise versus replacing professionals. Next,
  we analyze a study revealing only 2.1% of scientists actively use Claude Code;
  what role does AI play in research? Finally, Adobe's CFO Dan Dern transformed
  his finance team into an AI lab, using autonomous agents for forecasting,
  contract analysis and workflow automation. Our experts identify the three
  hottest areas for enterprise AI adoption. 


