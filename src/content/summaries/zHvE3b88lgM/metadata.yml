title: What People Really Want From AI
description: >-
  Anthropic's study of nearly 81,000 Claude users across 159 countries and 70
  languages reveals nuanced, coexisting hopes and fears about AI. Major hopes
  cluster around professional excellence, personal transformation, reclaimed
  time, learning, and societal gains in healthcare and education. Primary
  concerns center on unreliability, job displacement, loss of autonomy,
  cognitive atrophy, excessive restriction, and debates over sampling bias in
  the Claude-user dataset.


