title: Claude Code 2.1.73-74 - Just Released! (Update Overview)
description: >-
  Claude Code v2.1.73 and v2.1.74 ship 5 new features, 31 bug fixes, and 4
  improvements across two back-to-back releases — including a new modelOverrides
  setting for custom provider IDs, OAuth hang and refresh token fixes, a
  streaming API memory leak patch, six plugin and marketplace improvements, and
  RTL text support in Windows Terminal. Full breakdown of every change in these
  releases.


