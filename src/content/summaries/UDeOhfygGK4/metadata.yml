  Chapters

  0:00 5 Features, 31 Bug Fixes, 4 Improvements — Models & Providers

  0:28 Performance: CPU Freeze, Deadlock, Memory Leak, IDE Speed

  0:56 MCP & OAuth: Hanging Auth, Refresh Tokens, SSL Guidance

  1:24 Hooks & Sessions: Double Fire, JSON Hooks, SessionEnd Timeout

  1:50 Voice & Accessibility: Corruption Fix, macOS Mic, RTL Text

  2:15 Plugins & Marketplace: REPL, Submodules, /context, autoMemoryDir

  2:47 CLI Commands: /resume, /ide, /loop, /heapdump, /effort

  3:09 VS Code: HTTP 400, Scroll Wheel, Delete Button, Remote Control

  3:28 Update to v2.1.74


  Key Changes in These Releases:

  - modelOverrides setting: map model picker entries to custom provider IDs like
  Bedrock inference profile ARNs

  - Default Opus is now 4.6 on Bedrock, Vertex, and Foundry

  - Sub-agents no longer silently downgrade to older model versions

  - Permission prompts for complex bash commands no longer freeze the session at
  100% CPU

  - Deadlock when many skill files change at once (e.g., during git pull) is
  fixed

  - Streaming API memory leak causing unbounded RSS growth on Node is patched

  - MCP OAuth authentication no longer hangs when the callback port is already
  in use

  - Refresh tokens behind OAuth servers returning HTTP 200 errors now properly
  prompt for re-auth

  - SessionStart hooks no longer fire twice when resuming via --resume or
  --continue

  - JSON output hooks stop injecting no-op system reminder messages on every
  turn

  - SessionEnd hook timeout is now configurable through an environment variable

  - Up arrow restores interrupted prompts and rewinds the conversation in one
  step

  - New /context command gives actionable suggestions for context-heavy tools
  and memory bloat

  - autoMemoryDirectory setting lets you set a custom storage location for
  auto-memory files

  - RTL text (Hebrew, Arabic, right-to-left scripts) now renders correctly in
  Windows Terminal and VS Code


