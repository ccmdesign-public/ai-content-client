title: How Minikube Sets Up a Kubernetes Cluster in Minutes
description: >-
  Minikube bundles all Kubernetes components into a single-node cluster using a
  preconfigured ISO image — so you can get Kubernetes running locally in
  minutes. All you need is a hypervisor (VirtualBox, HyperV, or KVM), Minikube,
  and kubectl. That's it. 


  Watch the full tutorial here: https://youtu.be/XuSQU5Grv1g


