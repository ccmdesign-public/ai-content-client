title: Anthropic Just Solved Long Context
description: >-
  Anthropic just made the 1M token context window generally available for Claude
  Opus 4.6 and Sonnet 4.6; and dropped the long-context pricing premium
  entirely. In this video, I break down why the pricing move matters more than
  the context length, what the MRCR v2 benchmark reveals about actual retrieval
  quality at scale, and what this means for agents, Claude Code, and RAG.


