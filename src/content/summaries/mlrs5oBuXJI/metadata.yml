videoId: mlrs5oBuXJI
title: This VS Code Update Makes Web Dev Feel Like Magic
description: >-
  The VS Code team has introduced a new integrated browser that upgrades the old
  Simple Browser by letting you open and interact with webpages directly inside
  VS Code, with full DevTools, logs you can add to chat in one click, element
  selection for AI prompt context, and screenshot support. The script demos
  running Scott Hanselman’s Tiny Tool Town (an Astro site), inspecting the DOM
  and DevTools, and comparing Simple Browser’s limitations to the new browser,
  which can also handle server apps and sites like github.com for scenarios such
  as authentication testing. It also shows enabling chat tools so a chat agent
  can be shared the browser, navigate and test flows (optionally using
  Playwright), and implement a new count-up widget across pages while repeatedly
  validating changes in real time.


  00:00 Productivity Boost Intro

  00:18 What the Integrated Browser Does

  01:16 Demo Setup Tiny Tool Town

