  Anthropic continues to move aggressively with Claude Code, introducing a system that dispatches multiple AI agents to review pull requests, catching bugs that traditional quick reviews often miss. Meanwhile Microsoft is pushing toward autonomous productivity with Copilot Cowork, which can plan and execute tasks across your apps, documents, and calendar inside M365.

  We also cover new speculation about Gemma 4, why DeepSeek V4 might be delayed, OpenAI acquiring Promptfoo, updates from Grok, Gemini CLI improvements, and more.

  The AI ecosystem is evolving insanely fast — and these updates show just how competitive things are becoming between the major labs.

