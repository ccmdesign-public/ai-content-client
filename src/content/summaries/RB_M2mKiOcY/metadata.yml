title: Claude Code & MCPs built my $145K marketing machine
description: >-
  I sit down with Cody Schneider, growth engineer and co-founder of Graph, for a
  live, hands-on crash course in GTM (go-to-market) engineering powered by
  Claude Code. Cody walks through how he runs multiple AI agents simultaneously
  to handle everything from bulk Facebook ad creation and LinkedIn outreach to
  cold email campaigns and live data analysis — tasks that used to require a
  team of dozens. By the end of the episode, you'll have a full understanding of
  how to set up your own agent workflow, the specific tools involved, and why
  domain expertise paired with AI is the real competitive advantage right now.


  Cody’s GTM Toolkit:

  *AI/Agent Tools:* Claude Code, Perplexity API, OpenAI Codex


  *Marketing & Outreach:* Instantly AI (cold email), Phantom Buster (LinkedIn
  scraping/automation), Apollo API (data enrichment), Million Verifier (email
  verification), Raphonic (podcast host scraping)


  *Advertising:* Facebook Ads API, Facebook Ads Library (competitor research),
  Nano Banana Pro (AI image generation), Kai AI (bulk image generation), HeyGen
  API (UGC/video generation)

  *Infrastructure & Deployment:* Railway.com (servers, on-the-fly
  databases/Postgres), Vercel (deployment)


  *Data & Analytics:* Graphed / Graphed MCP (data warehouse, live data feeds),
  Google Analytics 4


  *CRM & Communication:* Salesforce (mentioned as comparison), Intercom,
  SendGrid API, Slack, Cal.com API


  *Productivity & Design:* Notion, Super Whisper (voice transcription), Claude
  Code front-end design skill, HTML to Canvas (for converting React components
  to PNGs)


  Cody's GTM Engineering Course: https://startup-ideas-pod.link/GTM-engineering


