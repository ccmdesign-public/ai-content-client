title: "Azure DevOps Engineer Exam: Question 21"
description: >-
  Azure Pipelines: Mastering Stage Order! 🚀 #shorts

  Goal: Ensure your Production stage triggers automatically—but only after the
  Test stage succeeds.


  The Solution: dependsOn 🎯


  - The Winner: Use the dependsOn property in your YAML stage definition.


  - The Logic: It creates a functional link where ""Stage B"" waits for ""Stage
  A"" to finish with a Succeeded status.


  Why not others? Manual approvals stop automation, standalone pipelines lack
  native tracking, and parallel jobs run simultaneously, breaking your
  deployment flow.


  Exam Tip: For AZ-400, ""sequential stages"" or ""success dependencies"" =
  dependsOn. 🛠️


