title: Promoveram Você… Mas Ninguém Te Avisou Disso
description: >-
  Ser promovido parece ótimo.


  Novo cargo.

  Mais salário.

  Mais responsabilidade.


  Mas existe uma parte da liderança que ninguém conta.


  No episódio de hoje do Bingo Corporativo, Abramo, Shapoka e Salomão discutem o
  choque de realidade que muita gente vive quando vira líder pela primeira vez.


  A conversa parte de um vídeo viral onde uma profissional conta o que ninguém
  explicou quando ela foi promovida.


  Ninguém avisou que:


  • adultos podem resistir a aprender

  • pessoas manipulam situações

  • cobrar resultado muda a relação com o time

  • se você for muito duro, vira o vilão

  • se for muito leve, vira o fraco


  O episódio mergulha nos bastidores da liderança, nos desafios reais de gerir
  pessoas e na diferença entre ser bom no trabalho e saber liderar um time.


  Se você já lidera, quer liderar ou já teve um chefe difícil, esse episódio vai
  bater perto.


  👇 Conta nos comentários:


  Qual foi a coisa mais difícil que você descobriu quando virou líder?
