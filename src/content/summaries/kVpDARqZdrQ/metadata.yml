title: Stable diffusion dreams of psychedelic faces
description: >-
  Prompt: "psychedelic faces"

  Stable diffusion takes a noise vector as input and samples an image. To create
  this video I smoothly (spherically) interpolate between randomly chosen noise
  vectors and render frames along the way.


  This video was produced by one A100 GPU taking about 10 tabs and dreaming
  about the prompt overnight (~8 hours). While I slept and dreamt about other
  things.


