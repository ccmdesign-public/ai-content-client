title: Claude NEW Computer Use in 6 Minutes
description: >-
  Claude Can Now Control Your Entire Computer (Dispatch Demo on Desktop +
  Mobile)


  Anthropic has released a new “computer use” capability for Claude that lets it
  see your screen and take keyboard and mouse actions across your entire
  machine, available via updated desktop and mobile apps through the Dispatch
  feature. The script explains setup steps (install latest apps, pair phone,
  enable computer use in settings) and notes it’s available on the Pro and Max
  plans. It describes how Claude first tries connected app connectors (like
  Slack or Calendar) and, if unavailable, asks permission to interact directly
  with apps as a fallback. In demos, Claude adds a calendar note (“be home for
  groceries”) and then runs a multi-step workflow: updating a Reminders grocery
  list and navigating Uber Eats to find a nearby Target and add items to the
  cart. The narrator highlights that it’s early days, can be slow, and may make
  mistakes but can course-correct.


