  Hey everyone, welcome to today's video! This deep dive showcases a fascinating
  3D animation created using AI, based on real data and images. 


  We'll explore the process of how to go from an "image to 3d" model,
  demonstrating the power of "3d ai" and "generative ai" in modern design.
  Discover how this innovative technique, including the use of "blender ai" and
  "sketchfab to blender" workflows, is changing the landscape of "3d modeling
  ai" and "3d art" to create detailed virtual environments like stadiums.


  In this video, Lukas walks you through creating a 3D animation using Remotion
  and AI, inspired by a tweet from Dillam Sanjaya. Learn step-by-step how to
  visualize the top earning soccer players with custom 3D assets and animations.


  - Setting up a new project folder and initializing Remotion in Cloud Code

  - Customizing prompts to visualize the top 20 earning soccer players,
  including sourcing real data

  - Installing and applying 3D assets from Sketchfab for realistic backgrounds
  and soccer balls

  - Adjusting graphics, sizes, and scene layout for optimal visual results


  Iterative improvements using Claude Code to refine animation, stacking
  effects, and overall design


