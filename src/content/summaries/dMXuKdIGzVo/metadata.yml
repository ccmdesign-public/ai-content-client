  Anthropic just dropped three updates for Claude in Excel and PowerPoint — and
  they're the best Office integrations I've seen yet. In this video I walk
  through the new Skills feature inside both add-ins, how Claude Cowork now
  syncs across files in real time, and how to import your own custom skills to
  run deterministic workflows directly inside Excel and PowerPoint.


