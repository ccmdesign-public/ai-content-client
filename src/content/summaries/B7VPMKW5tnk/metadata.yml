title: OpenSpec Workflow - How source of truth specification makes OpenSpec unique
description: >-
  The source-of-truth specification is what makes OpenSpec unique among
  Spec-Driven Development tools. In OpenSpec, changes are authored as deltas and
  then merged back into a single top-level specification that always reflects
  the current state of the system.


  This approach allows OpenSpec to potentially operate as a spec-anchored tool,
  in contrast to workflows where the specification is used primarily to flesh
  out a feature before implementation and is often discarded afterward.


