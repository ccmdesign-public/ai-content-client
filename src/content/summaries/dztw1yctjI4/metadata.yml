title: The Perils of the AI Exponential
description: >-
  Metr's "Moore's law for AI agents" chart shows agent time horizons expanding
  rapidly after Opus 4.6 and GPT‑5.3 delivered outsized generational jumps.
  Benchmarks reveal methodological caveats: task-set saturation, wide confidence
  intervals, and noisy measurements that complicate interpretation. Citrini
  Research's "2028 Global Intelligence Crisis" warns of concentrated capital
  gains, mass worker displacement, and market upheaval, prompting investor
  repricing and policy debates.


