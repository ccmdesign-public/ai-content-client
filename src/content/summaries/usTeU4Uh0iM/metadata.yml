  In this video, I show you how to turn Claude Code into the ultimate AI
  research agent by connecting it to NotebookLM — Google's free source-grounding
  tool powered by Gemini.


  Using a custom YouTube search skill (powered by yt-dlp) and the notebooklm-py
  CLI, you can search YouTube for any topic, push the top videos directly into
  NotebookLM, have it extract all the captions and build a queryable knowledge
  base, run analysis across every video, and generate deliverables like
  infographics, slide decks, and podcasts — all from your terminal.


  No vector databases, no embedding costs, no RAG infrastructure to maintain.
  The entire setup takes 5 minutes and replaces a research stack that would cost
  hundreds a month to build yourself.


