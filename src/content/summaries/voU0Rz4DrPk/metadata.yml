title: Building Custom LEGO Sets with MCP
description: >-
  If you ever wanted to leverage AI to help you make use of that forgotten box
  of LEGO bricks in your closet, well - do I have news for you. There's an open
  source MCP server that I put together that does just that - AND it will render
  you the set as you're asking it to change the 100th floating brick.


  You can get it on GitHub: https://github.com/dend/brick-mcp-app


  You can learn more about building MCP apps here:
  https://modelcontextprotocol.io/extensions/apps/overview


