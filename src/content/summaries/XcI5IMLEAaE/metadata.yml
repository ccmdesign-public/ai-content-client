title: Rebuilding Customer Support for the AI Era
description: >-
  In this episode of Founder Firesides, YC Managing Partner Harj Taggar talks to
  the founders of Pylon (W23), Marty, Advith, and Robert, who recently raised a
  $51M Series B. Pylon is an AI-native customer support platform built for B2B
  companies, replacing legacy tools like Zendesk with a modern system designed
  for Slack, Teams, and other shared channels. It helps support, success, and
  account teams manage customer conversations, structure data, and automate
  workflows — without losing the high-touch relationships B2B requires.


