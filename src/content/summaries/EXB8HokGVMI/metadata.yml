title: "Small Language Models (SLMs) Are the Future: Fine-Tuning AI That Runs on
  Your iPhone"
description: >-
  In this talk, I go over the rise of small language models (SLMs) and how they
  can benefit your business or day to day life.


  Talk date: March 12, 2026 at the Queensland AI Meetup.


  We'll look at case studies such as Sunny, an iOS application which uses a
  fine-tuned version of MedGemma to privately track skin health on-device.


  We'll break down why on-device inference matters (privacy, offline access,
  zero ongoing cost) and compare the economics of local models versus cloud API
  pricing at scale.


  Then we'll discuss the hardware and software optimizations required to run a
  model on a compute constrained device.


  Finally, we'll get hands-on and fine-tune a small language model live. 


  We'll walk through how to build a custom dataset, set up supervised
  fine-tuning using Hugging Face's SFT Trainer, and fine-tune a small model,
  Gemma 3 270M, in about two minutes on an RTX 6000 Blackwell GPU on Google
  Colab. 


  We'll see how the base model's outputs to the fine-tuned version side by side,
  showing how even a small model can be customized to know specific people,
  handle edge cases, and refuse to answer questions it shouldn't.


