title: Chroma's New 20B Model Beats GPT-5 at Search
description: >-
  Chroma just released Context-1 — a 20B parameter self-editing search agent
  that matches frontier models like GPT-5 and Opus 4.5 on retrieval benchmarks
  at a fraction of the cost and 10x faster inference. In this video, I break
  down what Context-1 is, how it compares to my own agentic file search project,
  and why this matters for anyone building RAG systems.

