  Prompt from the video (Chief of Staff Calendar Analysis):


  Pull my Google Calendar for the current week and next 4 weeks. Cross-reference
  every event against my Master Prompt (attached) to evaluate goal alignment,
  [task/department/company] time split , leverage level, and deep vs. shallow
  work. Then audit every event for quality issues: missing location, missing
  agenda, missing attendees, no confirmed RSVPs, vague titles, duration
  anomalies, scheduling conflicts, and missing prep docs. Merge both analyses
  into one Slack-formatted post organized by weekly buckets with completeness
  scores and a top-5 priority action list for my Chief of Staff. Post it
  directly in [desired slack channel] tagging me and my COS. Schedule to run
  every Saturday at 5 PM PST.


