  This month, we’ve introduced 9 major updates across Ahrefs!

  Here are the Ahrefs tools receiving key upgrades for December:

  ► Brand Radar
  ► Web Analytics
  ► Report Builder
  ► Site Explorer
  ► Social Media Manager
  ► Ahrefs API

  These updates strengthen analysis and reporting across Ahrefs, with Brand Radar now adding TikTok video indexing and Reddit visibility. Other improvements include custom query tracking for AI assistants, brand filtering in AI Visibility reports, access to historical Google Analytics data, expanded AI Visibility widgets in Report Builder, richer intent and SERP context in Site Explorer, post performance tracking in Social Media Manager, and new API endpoints for Brand Radar and Site Audit data.

  Explore the latest updates for clearer visibility and performance insights across search, AI, and social.

