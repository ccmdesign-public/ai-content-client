title: Generate SSH Keys in 10 Seconds (Windows, Mac & Linux)
description: >-
  🔐 Stop sharing passwords. Start using SSH keys.


  Passwords can be intercepted, shared, and stolen. SSH keys can't  because your
  private key never leaves your device.


  With one command (ssh-keygen), you get a public + private key pair that works
  on any OS.


  Public key = the lock you share 🔓

  Private key = the key only YOU keep 🗝️


  Set it up in 10 seconds. Works on Windows, Mac & Linux.


