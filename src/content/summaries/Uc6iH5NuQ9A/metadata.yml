title: Google NotebookLM Just Dropped 10 New AI Infographic Styles! (See them all)
description: >-
  Stop settling for boring, generic AI Infographics! In this video, we dive into
  the massive new update for Google NotebookLM - 10 brand new infographic
  styles, including Anime, Clay, Bricks, and more. 


  Even better? We’ve already updated the NotebookLM MCP & CLI so you can
  automate the generation of these stunning visuals directly through your AI
  tool such as Claude Desktop, Gemini CLI, or Claude Code. I'll show you exactly
  how to update your MCP, push the new NotebookLM skills to your AI agents, and
  generate a full suite of stylized infographics in seconds. If you're a content
  creator or dev, this is how you 10x your visual storytelling without touching
  a design tool.


  Key Takeaways:

  🎨 10 New Styles: From 'Kawaii' to 'Bento Grid' - NotebookLM just got a
  personality. I will show you all of them.

  🤖 MCP Automation: How to use the NotebookLM MCP & CLI to generate these via
  Claude Code.

  🚀 Workflow Upgrade: Moving from raw data to professional visuals with a
  single prompt.


  Resources:

  - NotebookLM MCP-CLI (GitHub): https://github.com/jacob-bd/notebooklm-mcp-cli

  - Previous OpenClaw Newsroom Video: https://youtu.be/cvdAqCM1wGs


