title: "OpenAI's GPT 5.4 in 10 Minutes: 1M Context, Computer Use, Coding Gains,
  Benchmarks & Pricing"
description: >-
  The video reviews OpenAI’s newly released GPT 5.4, highlighting access tiers
  (GPT 5.4 Thinking in ChatGPT Plus/Teams/Pro/Enterprise and GPT 5.4 in the
  $200/month tier) and API availability. It covers major upgrades in reasoning,
  coding, agentic workflows, and state-of-the-art computer use, including an
  upfront plan you can steer mid-response and up to one million tokens of
  context. The script summarizes benchmark improvements over GPT 5.3 Codex,
  noting OSWorld Verified at 75% vs humans at 72.4%, plus gains in BrowseComp
  and WebArena, and discusses more polished “knowledge work” outputs for
  documents and presentations. It shows coding examples like web-based games and
  3D simulations, cites positive feedback from Cursor, and details pricing
  (including 2x charges beyond 272k context) and a new Codex fast mode running
  1.5x faster.


