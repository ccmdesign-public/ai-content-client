title: "AWS AI Practitioner Question 21: Speech to Text"
description: >-
  For the AWS AI Practitioner exam, the correct service for converting thousands
  of customer call recordings into text is Amazon Transcribe. Unlike Amazon
  Polly, which performs text-to-speech, or Amazon Translate and Amazon
  Comprehend, which require text inputs for translation or analysis, Transcribe
  is built for audio-to-text conversion with features like speaker
  identification and multi-language support.  Effectively, Transcribe writes
  what is spoken, making it the essential first step for analyzing voice data.


