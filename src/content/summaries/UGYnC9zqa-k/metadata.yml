title: The End of Manual Debugging
description: >-
  In this episode of Founder Firesides, YC General Partner Aaron Epstein talks
  to Sherwood Callaway, founder of Sazabi (P26), who exited his first YC company
  and is coming back through YC for a second time. Sazabi is an AI-native
  observability platform that replaces tools like Datadog, letting engineers ask
  plain-English questions about their production systems instead of digging
  through dashboards. They discuss why logs are the only telemetry you need,
  lessons from building a company that didn't play to his strengths, and why
  maintaining software is AI's biggest untapped opportunity.


