  🚨 Why It Matters

  This marks the end of the manual era of mathematical research. When AI can
  discover new structure in mathematics, it changes what progress looks like
  across science, engineering, and physics. At the same time, the energy
  required to run long-horizon AI systems becomes a real constraint, forcing a
  parallel revolution in infrastructure. What happened here signals a future
  where intelligence and energy scale together, faster than institutions are
  prepared for.


