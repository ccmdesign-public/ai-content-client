title: Google Just Achieved Mathematical AGI
description: >-
  This month, AI crossed a line many believed would hold for decades. Google
  DeepMind revealed an AI system that independently solved open, PhD-level
  mathematical research problems that human mathematicians had been stuck on for
  years. Built on Gemini DeepThink, this agent explored unknown territory,
  abandoned dead ends, and produced entirely new, correct proofs without human
  guidance. At the same time, Google unveiled the infrastructure required to
  sustain this level of intelligence at scale, pairing long-horizon AI reasoning
  with massive renewable energy and multi-day battery storage. This wasn’t a
  gradual improvement — it was a hard break that signals the arrival of
  mathematical AGI.


