  Google just dropped Gemini 3.1 Flash Live, their new speech-to-speech voice
  model. In this video, I break down what makes it different, try it out for
  free in Google AI Studio, and then use Claude Code to build two working demos:
  a voice agent embedded on a website and a personal assistant that connects to
  my calendar and ClickUp. I also cover pricing, current limitations, and what
  it takes to actually deploy something like this.


