title: What is a Kubernetes Deployment? (Rolling Updates & Rollbacks Explained)
description: >-
  Pods and ReplicaSets are great for running apps in Kubernetes — but they are
  not enough for production. Kubernetes Deployments sit higher in the hierarchy
  and give you rolling updates, instant rollbacks, and the ability to pause,
  batch changes, and resume deployments. Whether you are upgrading your web
  server version or scaling resources, Deployments handle it all seamlessly.


