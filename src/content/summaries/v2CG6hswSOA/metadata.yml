title: RIP Lovable? New Preview Mode In Claude Desktop
description: >-
  I evaluate the newly launched website preview feature inside the Claude
  desktop app. This powerful tool for agentic coding offers a developer-focused
  alternative to Lovable and Replit. I explore initializing the local
  environment using the launch.json file, enabling the AI to take screenshots,
  toggle mobile views, and use the select element tool to pinpoint UI components
  without wasting context tokens. I also test the AI's ability to autonomously
  navigate the website, scroll, and input search filters. This demonstrates
  massive potential for automated QA testing. Despite minor limitations with
  localhost URLs, this update solidifies Claude Code for AI web development.


