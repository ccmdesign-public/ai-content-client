  Here’s what’s new in this update:

  AI-Native Canvas – A modern, spacious workspace that can handle images, code,
  and text all at once, plus an agent manager to track progress and manage
  multiple ideas in parallel.

  Smarter Design Agent – The AI now understands your full canvas context. It can
  swap logos, critique designs, generate PRDs, or even interview you to build a
  landing page from scratch. Mobile and desktop screens can now live together on
  the same canvas.

  Voice “Vibe Designing” – Powered by Gemini Live, you can design hands-free,
  navigate the canvas, explore layouts, and get real-time feedback—like having a
  design buddy sitting next to you.

  Instant Prototypes – Stitch screens together in seconds, preview interactive
  flows instantly, and let the AI auto-generate the next logical screen based on
  your clicks.

  Design Systems & design.md – Every project starts with a cohesive system for
  fonts and colors. Extract, import, or export your brand rules via an
  agent-friendly Markdown file.


  Stitch now lets you create, iterate, and collaborate faster than ever, turning
  your ideas into high-fidelity designs instantly.


  Try it here: stitch.withgoogle.com


