title: OpenAI Releasing AI Speaker with Vision (CONFIRMED)
description: |-
  OpenAI is moving into hardware with its first true consumer device, a smart speaker built around continuous visual awareness. This is not a concept or an experiment. The device includes a built-in camera, facial recognition for purchases, and deep integration with ChatGPT’s shopping, reasoning, and decision-making systems. Designed to live inside the home, it observes routines, learns patterns over time, and shifts AI interaction from command-based requests to persistent contextual understanding. With a reported price target between two hundred and three hundred dollars and a projected release window around early twenty twenty-seven, OpenAI is positioning this device as the first physical gateway for AI in everyday life.

