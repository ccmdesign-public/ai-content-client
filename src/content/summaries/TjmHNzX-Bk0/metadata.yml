title: RIP DoorDash, Uber & SaaS. Why This 2028 AI Memo Is Going Viral.
description: |-
  This week's briefing covers the biggest stories in product and AI — from the viral 2028 memo that wiped billions off DoorDash, Uber and Mastercard, to Perplexity's bold move into agentic computing and Stripe's vision for the future of payments. We break down what the memo actually says, whether its predictions hold up, and what it all means if you're building products today. 

  Plus, new data on AI design trends, Cursor's "third era" of software development, and why Anthropic's Code Modernization Playbook sent IBM's stock tumbling 13%.

  ➡️ Get more news, analysis and tutorials on Substack: https://departmentofproduct.substack.com
  How to use Cursor for non-engineering use cases: https://departmentofproduct.substack.com/p/how-to-use-cursor-for-non-engineering

  As always - let me know what you think about any of the things I've covered in the comments below.

