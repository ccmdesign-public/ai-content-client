title: This $5 Chip Can Run A Full OpenClaw AI Agent (zclaw)
description: >-
  In this video, we explore how to deploy zclaw, a remarkably tiny 888kb AI
  firmware that brings full agentic capabilities to a $5 ESP32-C3
  microcontroller. We walk you through the end-to-end installation and
  provisioning process. We demonstrate the potential of embedded AI in action as
  we code custom C tools to control a circular GC9A01 display and execute local
  hardware tasks via a secure Telegram interface.


