title: How to Verify Your Minikube Kubernetes Cluster is Running
description: >-
  Once Minikube is installed, always verify your setup with minikube status and
  kubectl get nodes. If your control plane, kubelet, and API server are all
  running — you're good to go. This short walks you through confirming a healthy
  single-node Kubernetes cluster. 


