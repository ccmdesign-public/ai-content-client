title: This AI Agent Runs My 0-Employee Marketing Agency
description: >-
  *Steal Barbara's workflow → build your own AI content agent:*
  https://clickhubspot.com/kdp

  Barbara Jovanovic runs an agency that turns webinars into full content
  ecosystems — LinkedIn posts, blog posts, newsletters, email sequences,
  short-form video scripts, and graphics. And she built the entire system in
  Claude Code in about 2 hours. She's not technical.


  In this episode, Barbara walks through exactly how she built a custom AI agent
  that takes a single webinar transcript and generates a complete content
  package in about 2 minutes. She demos it live, shows the output, and explains
  how context docs (writing style, brand guidelines, ICP, case studies)
  transform the output from generic AI writing to something genuinely usable.


  🎁 FREE DOWNLOAD: Barbara's webinar content engine markdown file

  *Steal Barbara's workflow → build your own AI content agent:*
  https://clickhubspot.com/kdp

  Download, drop it into Claude Code, and it will build the exact same agent on
  your laptop. Takes about 30 minutes to set up.


  📌 WHAT WE COVER:


  → The 3-step webinar content workflow: Plan → Promote → Repurpose

  → Why the live webinar is the LEAST important part of the system

  → Live demo: Uploading a Riverside transcript → full content package in 2
  minutes

  → What the output looks like: LinkedIn posts, newsletter, video scripts, email
  sequences

  → Why the first output is "70-80%" — and how to iterate to 100%

  → Context docs are the unlock: writing examples, brand guides, ICP, case
  studies

  → How Claude Code folder structure powers better output (vs generic prompting)

  → Building your own agent from scratch (even if you're non-technical)

  → SVG graphics → Figma workflow for editable AI-generated visuals

  → Automating the pipeline: Zapier, Make (n8n), scheduling posts

  → Tailoring email outreach by audience segment automatically

  → Why Barbara builds a separate agent for each client

  → Figma + Claude integration for seamless design handoff


