title: Weird Vibes at AI India Summit
description: >-
  The AI Impact Summit in India reframed AI as a global public good and
  amplified calls for affordable access and a global AI fund. Onstage friction
  between major CEOs highlighted intense commercial rivalry and viral metrics
  suggested shifting market leadership. Corporate strategies ranged from
  Walmart's Sparky boosting online conversion to Amazon's Clarity tracking AI
  use and Accenture tying AI adoption to promotions.


