title: The Q/A Layer for the AI Coding Era
description: >-
  In this episode of Founder Firesides, YC Managing Partner Harj Taggar talks to
  Weiwei Wu and Jeff An, co-founders of Momentic (W24), who just raised a $15M
  Series A. Momentic is the verification layer for software — an AI-powered
  testing platform that impersonates end users to catch bugs before they ship.
  Powering companies like Notion, Quora, and Built with over a million test runs
  a day, they discuss why the explosion of AI-generated code makes testing more
  critical than ever and their vision for a future where engineers write specs,
  not code.


