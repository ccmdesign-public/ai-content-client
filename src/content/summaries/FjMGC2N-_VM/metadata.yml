title: "How I built an iOS App in Claude Code using SuperApp: Set up, API
  Integration and Deployment"
description: >-
  In this video I show you the exact process: start your app on Superapp to get
  a working prototype fast (no setup headache, no blank page), then bring it
  into Claude Code to add real features like live API integrations, search by
  city, and custom logic.


  We built a Fuelio competitor from scratch, a fuel tracking and vehicle expense
  app with a clean minimalist design, a live map with real gas prices, and a
  city search feature. All in one session.


  What you'll see in this video:

  → How to use Superapp to go from prompt to working iOS prototype in minutes

  → Importing your project into Cursor and running Claude Code as an agent

  → How Claude Code finds and integrates real open source APIs for you

  → Searching and testing live gas price data by city on a real map

  → Publishing your app to the App Store directly from Superapp


  Tools used:

  → Superapp (3 p's): https://superappp.com

  → Claude Code: https://claude.ai/code

  → Cursor: https://cursor.com 

  → Gas Price Locator API by Zilla (free 7 day
  trial):  https://zylalabs.com/api-marketplace/data/gas+price+locator+api/4808


  Timestamps:

  0:00 - Claude Code vs iOS Dev Problem

  1:06 - Finding App Ideas & Researching Competitors

  2:09 - Building the App in Superapp

  4:20 - Adding Features (Map + UX Changes)

  5:40 - Moving Project to Claude Code 

  7:12 - API Integration for Live Gas Prices

  9:03 - Search Feature + Final App Result


