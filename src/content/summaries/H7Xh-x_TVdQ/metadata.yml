title: "Shanon: The Open Source AI Pentester Powered By Claude Code"
description: >-
  Shannon AI is an open source autonomous AI pen-testing tool (or hacker) that
  uses Claude to find security vulnerabilities like XSS, SQL injection, and SSRF
  through code analysis and browser automation. In this video, I demo Shannon
  running on the OWASP Juice Shop app, explain how it uses Temporal for durable
  execution across its five pentesting phases, break down the $66 cost in Claude
  API credits, and compare it to the upcoming Claude Code Security feature.
  We'll also look at Shannon Pro's enhanced data flow analysis capabilities.


