title: AWS AI Practitioner Question 33
description: >-
  Solving Bedrock issues like excessive length, competitor mentions, and
  hallucinations requires a targeted three-pronged strategy: Inference
  Parameters, Guardrails, and RAG. While Fine-tuning is expensive and System
  Prompts are often bypassed, setting the Max Tokens inference parameter at the
  API level ensures strict length control.  

  To block competitor names, Amazon Bedrock Guardrails provides a managed
  filtering layer, while Retrieval-Augmented Generation (RAG) grounds the model
  in your actual product data to eliminate hallucinations. This modular approach
  delivers professional, fact-checked results far more reliably than simply
  asking the model to 'behave' via a prompt.


