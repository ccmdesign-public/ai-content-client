title: Building AI Agents that actually work (Full Course)
description: >-
  I sit down with Remy Gaskell to break down how anyone can build AI agents to
  run entire departments of their business. Remy walks through the core
  concepts: agent loops, context files, memory, MCP tool connections, and
  skills. We put everything together by building a fully functional executive
  assistant live on screen. This is a beginner-friendly crash course that covers
  Claude Code, Codex, Cowork, Antigravity, Manus, and OpenClaw, showing that
  once you understand how to "drive," you can jump into any agent platform. By
  the end, listeners know exactly how to set up markdown-based context files,
  connect their everyday tools, and create reusable skills that compound over
  weeks and months.


