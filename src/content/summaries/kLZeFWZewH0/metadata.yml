title: Why AI Needs Better Benchmarks
description: >-
  ARC-AGI-3 from the ARC Prize measures intelligence by testing learning
  efficiency across 135 interactive visual games. Coverage examines benchmark
  saturation, benchmark maxing, and the shift from memorization-focused tests
  toward interactive, tool-enabled real-world evaluations. ARC-AGI-3 aims to
  expose gaps between human learning and current models and to refocus research
  on genuine general intelligence.


