  Can your AI agent hack its own evaluation? This week on Mixture of Experts,
  Tim Hwang is joined by  Ambhi Ganesan, Kaoutar El Maghraoui, and Sandi Besen
  to analyze OpenAI's Codex Security launch. Next, we explore eval awareness as
  Anthropic revealed  Opus 4.6 figured out it was being tested, located the
  answer key and decrypted it.. Then, Meta acquires Moltbook, the social network
  for AI agents, and we discuss the strategic play for agentic commerce
  infrastructure. Finally, Alibaba reports that an agent broke containment and
  started mining crypto. Are agents trying too hard to maximize rewards? All
  that and more on todays Mixture of Experts.  


