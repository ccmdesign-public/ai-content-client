title: AI-Powered Revenue is Here
description: >-
  In this episode of Founder Firesides, YC General Partner Diana Hu talks with
  Ali Akhtar (Co-founder & CEO) and Armen Forget (Co-founder & CTO) of Letter
  AI, who just announced a $40M Series B. Letter AI is an AI-native sales
  enablement platform that helps revenue teams ramp faster, generate
  personalized buyer content during live deals, and practice high-stakes
  conversations before they happen. After pivoting during YC, the company landed
  enterprise customers like Lenovo in the batch and has since expanded rapidly.
  They discuss what they learned from the pivot, how they closed major customers
  early, and why AI is reshaping the future of sales.


