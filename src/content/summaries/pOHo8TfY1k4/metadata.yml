title: Who Controls AI?
description: >-
  The standoff between Anthropic and the Pentagon exploded this week when
  President Trump directed every federal agency to cease using Anthropic's
  technology after the company refused to remove its red lines on autonomous
  weapons and mass domestic surveillance. As the episode unpacks the full
  timeline — from Dario Amodei's public statement to Trump's Truth Social post
  to OpenAI's deal with the Department of War — what emerges is a fight far
  bigger than one contract, touching the fundamental question of who gets to
  control the most important technology of the century.


