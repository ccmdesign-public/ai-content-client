title: Microsoft's New MAI 2 Shocks OpenAI and Hits Top 3
description: >-
  👉 Try Cinema Studio 2.5 here:
  https://higgsfield.ai/s/cinema-studio-2-5-airevolutionx-wGmxqB

  Microsoft just dropped MAI-Image-2, its own image model, and this is a much
  bigger move than a normal image update. Microsoft is pushing a core part of
  its AI stack further in-house, moving away from relying so heavily on outside
  labs for image generation. At the same time, MiniMax rolled out M2.7, a model
  built around long workflows, real engineering tasks, and agent systems that
  can help improve the scaffolding around themselves over time. So this video
  goes from Microsoft taking more control of image generation to MiniMax pushing
  deeper into self-evolving AI for real production work.


