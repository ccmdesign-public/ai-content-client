  Wishlist Insignia NOW: https://store.steampowered.com/app/1127370/Insignia In
  this episode we talk with indie game developers Nolan and Adam about the weird
  and creative side of game development. From viral projects like 1 Million
  Checkboxes to building pixel art games and experimental multiplayer ideas, we
  dive into how developers actually make games, where ideas come from, and why
  making lots of small projects can lead to big breakthroughs. We also discuss
  indie game dev culture, programming tools, game jams, and the unexpected paths
  that lead people into creating games.


