title: "Electrobun: No Node, No Chromium, Just Pure Bun Performance"
description: >-
  Electrobun is a cross-platform desktop app framework that delivers apps 6x
  smaller than Electron while maintaining native performance. Created by Yoav
  from Blackboard, this Bun-based framework uses native webviews instead of
  shipping Chromium, resulting in 68MB desktop apps compared to Electron's
  200MB+ bundles. It let's you use any JavaScript React, Svelte, Vue, or
  Angular, and there have already been some great apps built with it like a
  hybrid browser/terminal/editor, text-to-speech app, and Doom running with
  WebGPU. Despite being a newer project with some documentation gaps, Electrobun
  offers Bun developers a compelling path to desktop app development with
  significantly smaller bundle sizes and native speed.


