title: GSD Is the Missing Piece For Claude Code
description: >-
  Every AI coding agent framework claims to be the best. GSD, get shit done, is
  built different. Whether you use Claude Code, Gemini CLI, or any vibe coding
  setup, picking the wrong framework with Claude wastes more time than bad code.


  BMAD Video: https://youtu.be/fD8NLPU0WYU?si=zLOFI5UAX01xKAjD

  SuperPowers Video: https://youtu.be/romGzY0Xu0s?si=QQqBx2DKNANSHz0V 

  Get Shit Done: https://github.com/gsd-build/get-shit-done


  AI agents framework selection is the real bottleneck, not the framework
  itself. In this video, we break down three approaches, GSD, BMAD, and
  Superpowers, and show you exactly when to use each one. GSD is built for
  experimental MVPs where requirements shift, BMAD is for locked-in specs with
  thorough pre-planning, and Superpowers uses TDD for high-stakes agentic AI
  systems where edge cases can't be missed.


  We walk through a full GSD installation and build, from the initial planning
  phase through multi-wave implementation with subagents, adversarial plan
  verification, and Playwright testing. You'll see how it manages context rot,
  parallelizes work across coding agents, and keeps documentation concise so
  your AI automation pipeline stays focused.


  Whether you're evaluating the best AI for coding your next MVP or comparing
  the best coding AI workflows for production apps, this breakdown will help you
  stop guessing. Most coding AI comparisons skip the selection criteria
  entirely, they just tell you which AI tools are trending. We go deeper into
  how AI works within each framework and why the structure around your AI
  matters more than the model itself. If you've looked at OpenAI, Claude, or any
  other provider and wondered why your agent keeps drifting off task, the answer
  is usually in the framework, not the model.


  This applies whether you're using Claude Code, vibe coding solo projects, or
  building with opencode alternatives. The principles carry across every coding
  setup. And if none of the existing frameworks fit, we point you to a previous
  video on building your own AI coding workflow from scratch.


