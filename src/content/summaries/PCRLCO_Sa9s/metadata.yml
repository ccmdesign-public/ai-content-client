  Key Terms Covered

  - LLM (Large Language Model) — The engine behind ChatGPT, Claude, and Gemini

  - Prompt — Your input instruction to an AI model

  - Token — The text chunks AI reads and processes

  - Hallucination — When AI confidently generates false information

  - Fine-Tuning — Specialized extra training for specific tasks

  - Neural Network — Brain-inspired layers of nodes that process data

  - Transformer — The architecture that processes all words simultaneously (the
  T in GPT)

  - RAG (Retrieval-Augmented Generation) — Connecting AI to external, up-to-date
  data sources

  - Context Window — The maximum amount of text AI can process at once

  - AGI (Artificial General Intelligence) — Human-level AI across all tasks
  (doesn't exist yet)


