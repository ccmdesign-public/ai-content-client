title: QI Alto, Salário Baixo 🤡 O Problema de Quem Não Sabe Ler Pessoas
description: >-
  Soft skills realmente fazem diferença na carreira ou isso é papo de coach?


  Neste episódio do Bingo Corporativo, discutimos um estudo de Harvard que
  mostra algo desconfortável para muita gente:

  👉 quem tem alta habilidade social ganha mais do que quem é excelente apenas
  em matemática ou técnica.


  A conversa parte de uma pesquisa de David J. Deming, que analisa décadas de
  dados e chega a conclusões provocadoras sobre:


  Por que saber lidar com pessoas impacta mais o salário do que hard skills


  Como a tecnologia vem reduzindo o peso da habilidade técnica pura


  O que diferencia um bom profissional de alguém que realmente cresce na
  carreira


  Por que empatia, leitura emocional e tomada de decisão são treináveis


  E o perigo dos líderes carismáticos no mundo corporativo


  Falamos também sobre:


  A diferença entre ser político, ser omisso e ser puxa-saco


  Soft skills vs hard skills: quem realmente sobrevive no longo prazo


  Como “ler o outro” virou uma habilidade central para liderança


  Por que gente é mais difícil do que qualquer cálculo


  Se você trabalha em empresa, lidera pessoas ou quer crescer profissionalmente,
  esse episódio é um tapa educado (e necessário).
