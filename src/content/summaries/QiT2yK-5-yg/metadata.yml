title: An Honest Conversation on AI and Humanity @wef | Yuval Noah Harari
description: >-
  AI is different to any tool humans have previously created. It can learn,
  change and make its own decisions. A knife cannot choose whether to cut a
  vegetable or commit murder. An AI can – and it can lie and manipulate to serve
  its own interests. How do we make sure that we benefit from AI while remaining
  in control?


  From the 2026 World Economic Forum Annual Meeting in Davos, Switzerland. The
  meeting welcomes over 100 governments, partners and major international
  organizations, as well as civil society leaders, experts, youth
  representatives, social entrepreneurs, and news outlets.


