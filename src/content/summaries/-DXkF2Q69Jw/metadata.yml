title: GitHub Actions are DEAD. (Use Agentic Workflows instead)
description: >-
  GitHub is moving past traditional automation with Agentic Workflows, a new
  project that allows you to manage CI/CD pipelines using natural language
  instead of rigid code. We’ll show you how to set up an AI DevOps assistant
  that uses "Productive Ambiguity" to exercise judgment and maintain code
  quality autonomously within your repository. Learn how to bridge the gap
  between AI intelligence and standard security guardrails to build a
  self-governing system that modernizes your development workflow.


