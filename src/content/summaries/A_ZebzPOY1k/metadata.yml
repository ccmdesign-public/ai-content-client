title: Claude Code changed this year (did you notice?)
description: >-
  Claude Code in 2026 is not what it was a year ago. In this video, I walk
  through three features — auto-plan, auto-memory, and voice mode — that might
  look like small quality-of-life improvements on the surface, but are actually
  reshaping how we work and what we're able to build.


  These aren't the flashy headline features. They're the ones that quietly
  change your daily workflow — better planning before code gets written, Claude
  learning from its own mistakes over time, and voice input that removes the
  friction standing between your ideas and your prompts.


