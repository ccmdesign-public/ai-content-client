  Chapters

  0:00 PowerShell for Windows, TaskCreated Hook, and Conditional Hook Filtering

  0:30 MCP Deduplication, OAuth RFC 9728, and Enterprise Plugin Controls

  1:06 Idle-Return Prompt, 5K Deep Links, and 1.5M Token Display

  1:32 VS Code Rate Limit Banner, 16x Stats Screenshot, and Yoga-Layout Swap

  1:58 Push-to-Talk Fix, Ctrl+U Multiline, and Terminal Keyboard Mode
  (Ghostty/Kitty)

  2:23 Stream Idle Timeout, x-client-request-id Header, and ECONNRESET Fix

  2:48 /compact Context Fix, macOS Keychain, Cold-Start Race Condition

  3:15 Update Command, 75K+ Developers, Subscribe CTA


  Key Changes in This Release:

  - PowerShell tool: opt-in Windows shell alternative to bash, first native
  PowerShell support in Claude Code

  - Conditional hooks: new `if` field using permission rule syntax (e.g.,
  Bash(git *)) reduces hook process spawning overhead

  - MCP deduplication: servers configured locally and via claude.ai connectors
  are deduplicated, local config takes priority

  - VS Code rate limit warning: banner shows usage percentage and reset time so
  you never hit surprise limits

  - Layout engine swap: WASM yoga-layout replaced with pure TypeScript for
  smoother large transcript scrolling


