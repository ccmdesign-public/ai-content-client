title: 7 BANNED Medieval Vegetables Big Agriculture Wants To Erase
description: >-
  Medieval gardens grew over 100 different vegetables. Your grocery store
  carries about 30. And most of those 30 are the same plant bred into different
  shapes. Broccoli, cauliflower, kale, Brussels sprouts, cabbage are all the
  same species, wearing a different costume.


  Seven vegetables that fed Europe for centuries have been quietly pushed out of
  seed catalogs, removed from commercial farming, and in some cases made illegal
  to sell as food. Not because they failed. Because they couldn't be shipped,
  stored, or mass-produced fast enough to make corporations money.
