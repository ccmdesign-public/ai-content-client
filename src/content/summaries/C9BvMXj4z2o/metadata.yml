title: AWS IAM Roles Explained
description: >-
  An AWS IAM Role works like temporary permission borrowing — a user assumes the
  role, inherits its permissions to perform specific actions, and then reverts
  back to their original access once done. No permanent changes, no extra
  standing permissions. IAM roles are the recommended way to grant temporary
  access to users and AWS services alike.


