title: Claude Code Worktrees in 7 Minutes
description: >-
  Anthropic has released Git Wortrees in Claude Code, bringing a feature
  previously available in the Claude Desktop app directly into the CLI. The
  script explains Git worktrees as a way to check out multiple branches of the
  same repository simultaneously in different directories while sharing the same
  Git data, and shows the prerequisites to use them (a Git-initialized directory
  with at least one commit). It demonstrates running `claude-worktree` in
  multiple terminals to create isolated working directories and make different
  HTML changes in parallel, then examines the generated folder structure with
  unique worktree paths. The episode also shows how to use worktree isolation
  with Claude Code subagents to parallelize tasks—spawning five subagents to
  create five different SaaS landing page variations—and highlights benefits
  like avoiding conflicts and offloading context from the main thread. It covers
  creating and configuring subagents via natural language and via files with
  front matter (name, description, model such as Haiku, and the new `isolation:
  worktree` setting), where subagent definitions can live globally or within a
  project under `.claude/agents`, and notes that tool access can be whitelisted
  (including MCP tools). The video closes by suggesting use cases such as
  testing, migrations, and exploring divergent implementation paths, and thanks
  the Anthropic team before a standard like/comment/subscribe outro.


