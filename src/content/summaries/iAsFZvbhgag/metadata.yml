title: Google’s New Gemini Update Shocks Microsoft With Powerful New AI
description: >-
  👉 Check out Higgsfield Audio: https://tinyurl.com/higgsfieldaudio

  Google just rolled out a major Gemini update that could reshape the AI race
  with Microsoft. The company is pushing Gemini deep across its ecosystem,
  turning everyday tools into AI-native systems used by hundreds of millions of
  people. At the same time Google introduced a new infrastructure model called
  Gemini Embedding Two, designed to connect text, images, video, audio, and
  documents inside one shared AI understanding space. In this video we break
  down how the new Gemini-powered Workspace works, why its spreadsheet
  performance is getting close to human experts, and how Google’s latest AI
  infrastructure could influence the future of the entire AI industry.


