title: If You Don’t Hire These 5 Roles in 2026, You're in Trouble
description: >-
  *Get our AI Career Guide ($100k AI jobs):* https://clickhubspot.com/ebt

  Ep. 411

  “Most marketing teams are scaling with AI right now, and the output is getting
  worse and worse”

  Kieran dives into the 5 essential future roles every marketing team needs to
  master AI and stand out as AI transforms the industry.  Learn more on why
  simply creating more content with AI isn’t enough, how brands like Unilever
  and Coca-Cola are experimenting (and sometimes struggling) with AI-driven
  marketing, and which new roles—like prompt strategist and agent ops
  manager—will define successful marketing teams in the era of autonomous
  agents.


