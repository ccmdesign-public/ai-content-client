title: Josh Puckett - Crafting interfaces with uncommon care
description: >-
  What does it look like to demonstrate uncommon care in the way you design and
  build an interface?


  Josh Puckett (https://x.com/joshpuckett?lang=en) has has spent nearly two
  decades designing products like Wealthfront, Dropbox and helping dozens of
  startups.


  But recently he released Interface Craft (https://www.interfacecraft.dev/)
  which is a library of everything he's learned about through the years about
  designing with “uncommon care” 👇


