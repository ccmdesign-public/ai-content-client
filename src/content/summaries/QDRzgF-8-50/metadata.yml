title: China’s New AI Robots Just Broke The Human Skill Barrier
description: |-
  This week in robotics got kind of ridiculous. South Korea showed off a humanoid that can run, jump, play soccer, and moonwalk, China pushed humanoids deeper into tennis, sprinting, and human-like motion, and UBTech is now aiming to mass-produce 10,000 humanoid robots with Siemens. On top of that, a restaurant robot caused chaos in public, another robot reads human brain signals to stop mistakes before they happen, and new breakthroughs in biohybrid robots, compostable soft robots, and robotic hands made the whole week feel way more serious than usual.

