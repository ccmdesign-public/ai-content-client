title: “We Are Living Through a 1918, 1945, 1989 Moment," — Stubb Explains the
  New World Order | AC1B
description: >-
  Finland’s President Alexander Stubb addresses the changing global order at WEF
  2026 in Davos, calling the current moment the 1918, 1945, or 1989 of our
  generation. He outlines “values-based realism” and dignified foreign policy as
  tools for navigating conflicts from Ukraine to Greenland, while urging Europe
  to preserve sovereignty, strengthen transatlantic ties, and adapt to a rapidly
  shifting multipolar world.

  For more details, watch our story and subscribe to our channel, DRM News.


  DRM News provides live coverage from Davos as Finnish President Alexander
  Stubb joins Mark Leonard in a panel discussion on "Rebalancing the New World
  Order" at the World Economic Forum 2026. The session analyzes the erosion of
  the liberal international order amid rising power politics and multipolar
  dynamics, with insights on transatlantic relations, Ukraine support, and
  European strategy. Join for real-time dialogue, key perspectives, and
  implications for global stability. Watch now.


