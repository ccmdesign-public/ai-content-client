  01:02:55 – Jensen Huang's take: OpenClaw as the new computer


  Key Points


  * Upload the OpenClaw documentation into a Claude project to create a
  dedicated troubleshooting baseline — it solves roughly 99% of setup issues.

  * Use the OAuth method (your existing $20 ChatGPT or Anthropic subscription)
  to avoid expensive API costs, and always configure backup models.

  * Memory problems are almost always caused by memory never being saved in the
  first place; add an auto-save instruction to the heartbeat file so it logs
  every 30 minutes.

  * Organize your OpenClaw conversations into separate Telegram groups and
  topics with group-specific system prompts to avoid context bleed.

  * Stronger models are meaningfully more resistant to prompt injection; pair
  that with least-access principles and agent-owned accounts for a solid
  security posture.

  * Custom skills are the path to real automation — whenever you do something
  repeatedly, tell your OpenClaw to turn it into a skill.


  Numbered Section Summaries


  1. OpenClaw Explained: What It Is and How It Differs


  Moritz breaks down OpenClaw as the first truly personal, autonomous agent —
  one that remembers, runs on a heartbeat every 30 minutes, executes cron jobs,
  and lives inside whatever chat app you already use. He maps the evolution from
  ChatGPT (cloud chat) to Claude Code (local files) to OpenClaw (persistent,
  proactive, and portable).


  2. OpenClaw vs. Claude Cowork and Dispatch


  Anthropic's new Dispatch feature and Claude Cowork are moving toward what
  OpenClaw already does, but OpenClaw remains more powerful and feature-rich
  today. Moritz frames the long-term comparison as Linux vs. Windows: the
  open-source version attracts community contribution, flexibility, and
  customization that proprietary tools have a harder time matching.


  3. The 10-Step Optimized Setup


  The core of the episode. Moritz walks step by step through: creating a
  troubleshooting project with the official docs, personalizing workspace files
  (agents.md, soul.md, user.md, identity.md), fixing memory with compaction
  settings and heartbeat auto-save, selecting models via OAuth, organizing
  Telegram groups with system prompts, understanding the three browser modes,
  activating and building skills, tuning the heartbeat file, hardening security,
  and applying least-access principles with agent-owned accounts.


  4. Model Selection and the OAuth Shortcut


  Instead of paying per-API-call, Moritz recommends hooking OpenClaw into an
  existing $20 ChatGPT subscription via OAuth. He suggests setting up a backup
  chain — OpenAI as primary, Anthropic as secondary, and open-source models
  through OpenRouter or Kilo Gateway as fallbacks — so the agent always has a
  working brain.



