title: How to add short-term memory to your  AI agent (Sessions & State Explained)
description: >-
  Lab → https://goo.gle/agentmemorylab

  ADK doc →https://goo.gle/4t2J6BG

  ADK crash course → https://goo.gle/adk-lab


  Learn how to pass information between agents with agent short term memory.
  Annie breaks down short-term memory for AI agents using Google's Agent
  Development Kit (ADK), including how sessions, events, and state work together
  to keep your agent context aware. 


  Chapters:

  0:00 - Intro

  1:22 - What a session is and why it matters for agent memory

  2:00 - [Demo] Memory loss vs memory fixed 

  2:48 - The difference between events (full interaction logs) and state
  (quick-access context)

  3:53 - A live demo comparing an agent with and without short-term memory

  5:05 - Recap


  This is part 1 of a 3 part memory series — stay tuned for episodes on
  persistent memory and long-term memory!


