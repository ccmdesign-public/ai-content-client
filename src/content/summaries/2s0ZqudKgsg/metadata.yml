title: "Microsoft Certified DevOps Engineer Question 6: Code Reuse"
description: >-
  Azure Pipelines: Reuse Your Code! 🏗️ 


  The Scenario: Migrating from Classic to YAML Pipelines. You need to reuse
  common steps (Build/Test) across multiple projects without duplicating code.


  The Solution: YAML Templates 🎯

  - The Win (Option B): Use YAML Templates.

  - How it Works: Extract common steps into a standalone YAML file. Reference
  this file in any pipeline across your organization.

  - The Result: ""Don't Repeat Yourself"" (DRY) pipelines that are easier to
  maintain and update.


  Why not others?

  - Release Definitions: Part of the legacy Classic model.

  - Classic Build Templates: Deprecated and incompatible with YAML.


  Exam Tip: For AZ-400, ""reusable steps in YAML"" always means YAML Templates.
  🚀


