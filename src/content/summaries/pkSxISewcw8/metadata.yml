  Claude Code just released auto mode, a new permission setting that sits
  between "ask before every edit" and "dangerously skip permissions." 


  Instead of stopping your workflow every few seconds or giving Claude free rein
  to do anything, auto mode uses a classifier to check each action for risk
  before executing it. Safe actions run automatically, risky ones get flagged.
  In this video I break down how it works, test it with some real examples, and
  show you how to turn it on.


