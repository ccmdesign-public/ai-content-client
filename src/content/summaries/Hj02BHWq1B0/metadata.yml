title: "Azure DevOps Engineer Exam: Question 13"
description: >-
  For the AZ-400 exam, the secure way to handle sensitive data in GitHub Actions
  is by using GitHub Secrets within the secrets context. Storing credentials in
  Env files or public secrets is a major security risk because they can be
  committed to the codebase or exposed in plain text. By storing values in the
  repository settings and referencing them via ${{ secrets.SECRET_NAME }},
  GitHub automatically applies masking to prevent these values from appearing in
  logs or pull request outputs.  This ensures that even if a script tries to
  print a password, it is redacted, maintaining a robust and auditable security
  posture for your automated workflows.


