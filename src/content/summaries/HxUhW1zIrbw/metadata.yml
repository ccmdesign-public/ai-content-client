title: China’s New CENTAUR AI ROBOT Gives Humans Super Strength
description: |-
  China just revealed a robotic system that can turn a human into something that moves like a centaur, helping people carry heavy loads with far less effort. At the same time, a Unitree humanoid robot is performing extreme athletic moves using a new motion framework called OmniXtreme. In healthcare, researchers are testing AI powered surgical gloves that assist doctors with delicate procedures, while Figure AI continues pushing humanoid robotics with a robot that can clean a messy living room on its own. Meanwhile Meta has quietly acquired Moltbook, a strange social network where AI agents interact with each other online.

