title: Exploits of public-facing apps are surging. Why?
description: >-
  Explore the Threat Intelligence Index 2026 → https://ibm.biz/Bdpi6d   


  For years, stolen credentials were king—the hacker’s attack vector of choice.
  Until now. 


  The 2026 IBM X-Force Threat Intelligence Index reveals a surge in the
  exploitation of public-facing applications, overtaking identity-based attacks
  as the top initial access vector.  


  Why are threat actors changing their tactics so dramatically—and what does it
  mean for defenders? 


  In this episode of Security Intelligence, panelists Claire Nuñez, Chris Caridi
  and Joe Xatruch break down the biggest findings from the latest Threat
  Intelligence Index, plus: 


  "-Infostealers that grab AI agents’ “souls”

  "-Compromised packages that drop AI agents as malware"

  "-The AI infrastructure flaws we can’t seem to fix"

  "-Why threat intelligence is so siloed—and what we can do about it"


  All that and more—on Security Intelligence. 


