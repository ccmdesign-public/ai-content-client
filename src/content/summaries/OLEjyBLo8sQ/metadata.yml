title: This Startup Beat Gemini 3 on ARC-AGI — at Half the Cost
description: >-
  Poetiq is a new startup founded by former DeepMind researchers that recently
  achieved a major jump on the ARC-AGI benchmark by layering a recursive
  self-improvement system on top of Gemini 3. In this conversation at NeurIPS,
  YC's Francois Chaubaurd sat down with Poetiq co-founder Ian Fisher to find out
  how they're increasing performance using prompts and system design alone. They
  also explore recursive self-improvement, benchmarking progress toward AGI, and
  why automating prompt engineering may be one of the most powerful levers in AI
  today.


