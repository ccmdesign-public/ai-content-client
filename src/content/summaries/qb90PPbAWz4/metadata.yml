  Key Points


  * Autoresearch is an open-source AI agent that sets a goal, runs experiments
  in a loop on a GPU, keeps the winners, and discards the rest — all while you
  sleep.

  * You need an NVIDIA GPU to run it (tested on H100), but you can rent one
  cheaply through Lambda Labs, Vast AI, RunPod, Google Cloud, or Google Colab.

  * The fastest way to get started is to use Claude Code to walk you through
  installation, then run it on Google Colab with a T4 GPU runtime.

  * Ten business ideas built on Autoresearch span niches like SaaS optimization,
  A/B testing agencies, trading backtests, CRM lead scoring, and done-for-you
  due diligence.

  * Karpathy also launched Agent Hub — essentially a GitHub designed for agent
  swarms to collaborate on the same codebase.

  * The project already has 25,000+ GitHub stars and is growing fast; early
  movers who tinker now build an unfair advantage.


