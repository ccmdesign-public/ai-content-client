title: Karpathy's "autoresearch" broke the internet
description: >-
  I break down Andrej Karpathy's new open-source project, Autoresearch: what it
  is, how it works, and why some of the smartest people in tech are losing their
  minds over it. I walk through 10 concrete business ideas you can build on top
  of Autoresearch loops, from niche agent-in-a-box products to always-on A/B
  testing agencies. I also cover Karpathy's companion launch, Agent Hub, share
  community reactions, and show you step by step how to get started using Claude
  Code and a Colab GPU.


  I'm hosting a free workshop so you can build your business in the age of AI.

  Sign up here: https://startup-ideas-pod.link/build-with-ai-2026


  Links Mentioned:

  Autoresearch Github: https://startup-ideas-pod.link/autoresearch


