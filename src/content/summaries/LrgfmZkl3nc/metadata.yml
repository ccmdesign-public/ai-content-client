  Anthropic quietly released a new Claude Code feature called auto dream. It
  runs a background sub-agent that reviews your memory files across sessions,
  then consolidates, prunes, and reorganizes them so every new conversation
  starts cleaner. 


  In this video I walk through how to turn it on, what it actually does behind
  the scenes, and why it reminds me of how humans store long-term memories
  during sleep.


