title: Mark Zuckerberg Fez Mais Mal do Que Bem? A Verdade Sobre o Dono do Facebook
description: >-
  Mark Zuckerberg é um gênio visionário ou o responsável por alguns dos maiores
  problemas do mundo digital?


  Neste episódio do Bingo Corporativo, analisamos a biografia completa de Mark
  Zuckerberg: da criação do Facebook em Harvard ao escândalo da Cambridge
  Analytica, passando pela compra do Instagram e WhatsApp, a aposta no
  metaverso, a transformação da empresa em Meta e as polêmicas envolvendo
  eleições, privacidade e manipulação de dados.


  Discutimos:


  • A origem do Facebook

  • As acusações de roubo de ideia

  • O conflito com Eduardo Saverin

  • A compra bilionária do Instagram

  • O impacto das redes sociais na sociedade

  • Vício digital e algoritmos

  • O futuro da Meta e da inteligência artificial


  Zuckerberg é inevitável? Ou ele criou o “tabaco digital” da nossa geração?


  Se você se interessa por tecnologia, liderança, mundo corporativo e os
  bastidores das big techs, este episódio é para você.


  🔔 Inscreva-se no canal para mais debates sobre liderança, carreira e os
  bastidores do mundo corporativo.



  O Bingo Corporativo é um podcast sobre liderança, carreira e os bastidores do
  mundo corporativo. Alexandre Abramo, Shapoka e Salomão discutem de forma
  direta, provocativa e bem-humorada temas como gestão de pessoas, cultura
  organizacional, política no trabalho, desenvolvimento profissional, conflitos
  corporativos, retenção de talentos e os dilemas reais das empresas modernas.


  Aqui você encontra debates sobre chefes difíceis, crescimento na carreira,
  gerações no ambiente corporativo, produtividade, comportamento profissional,
  poder nas organizações e os erros e acertos de quem vive o jogo corporativo
  todos os dias.


  Se você trabalha em empresa, lidera times ou quer evoluir profissionalmente, o
  Bingo Corporativo é o seu espaço para entender como o mundo corporativo
  realmente funciona — sem romantização e sem filtro.


