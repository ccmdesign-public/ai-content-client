title: "CEO of Framer: Why Designers Should Become Founders"
description: >-
  In this episode of Design Review, YC’s Aaron Epstein sat down with Jorn van
  Dijk, the CEO and Co-founder of Framer. Together they unpack the brutal “gray
  zone” between early revenue and real product-market fit, the pivot that
  reignited their growth, and how to adapt as AI reshapes how we build and
  design software.


  Chapters:

  00:00 - Intro to Jorn van Dijk, the CEO and co-founder of Framer

  00:34 - Framer’s Scale: $2B Valuation, 120 People around the globe

  01:06 - Jorn’s Design Roots

  01:49 - Why Dutch Design Culture Is So Strong

  03:43 - Sofa: The Studio That Shaped Jorn (and His Co-Founder)

  04:39 - Building Mac Products: Checkout, Versions, Kaleidoscope

  06:13 - Apple Design Awards And A Game Changing Email

  07:24 - Facebook Acquisition: Why They Wanted Designers

  09:27 - Culture Shock: From 15-Person Studio to Facebook Scale

  10:27 - Leaving Facebook: Intentionally Learning to Build a Big Company

  13:12 - Early Experiments: Bitcoin App, Fashion App, Framer Prototype Tool

  18:37 - The Plateau: Why Framer Studio Hit a Ceiling Around $4–5M ARR

  23:52 - The Decision: Sell, Quit, or Pivot

  25:30 - The Big Insight: People Hate Rebuilding 

  34:55 - AI + Design: What’s Changing & What Isn’t


