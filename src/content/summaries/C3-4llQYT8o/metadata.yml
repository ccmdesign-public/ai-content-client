title: "Paperclip: Hire AI Agents Like Employees (Live Demo)"
description: >-
  I sit down with Dotta, the pseudonymous co-founder of Paperclip, the
  open-source agent orchestrator that exploded to 30,000 GitHub stars in under
  three weeks. We walk through a live demo where I pick a startup idea from my
  idea browser and we spin up a full AI-agent company in real time — hiring a
  CEO, founding engineer, QA agent, video editor, and content strategist inside
  Paperclip. Dotta shares practical tips on agent configuration, memory systems,
  skill installation, and the "Memento Man" mental model for keeping agents on
  track. The conversation covers everything from token spend management and
  agentic design patterns to the future of importable, shareable companies and
  the upcoming Maximizer Mode.


  Skills to build your agent team: https://startup-ideas-pod.link/skill-suite


