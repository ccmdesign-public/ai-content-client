title: "Todo mundo se sabota: o dilema do caranguejo no mundo corporativo |
  Bingo Corporativo"
description: >-
  Todo mundo se sabota no mundo corporativo — muitas vezes sem perceber.

  Neste episódio do Bingo Corporativo, falamos sobre o dilema do caranguejo,
  futuro do trabalho, IA e por que empresas e pessoas travam a própria evolução.

  Uma conversa direta sobre comportamento, poder, medo de mudança e realidade
  corporativa.


  O discurso é sempre o mesmo:

  inovação, futuro, tecnologia, inteligência artificial.


  Mas na prática, o que vemos é um ambiente onde ninguém deixa ninguém sair da
  panela.


  Neste episódio, Alexandre Abramo, Shapoka e Salomão discutem o dilema do
  caranguejo aplicado ao mundo corporativo:

  pessoas e organizações que dizem querer evoluir, mas se sabotam coletivamente.


  Falamos sobre:


  por que o medo ainda manda nas decisões corporativas


  como a IA expõe problemas que já existiam


  comportamento de manada no trabalho


  o papel da liderança nesse ciclo de sabotagem


  por que o futuro exige mais coragem do que discurso


  🎙️ Bingo Corporativo é um podcast sobre trabalho real, sem gurus, sem
  promessas vazias e sem romantizar o cansaço.
