title: Val Kilmer's AI Resurrection
description: >-
  AI recreated Val Kilmer's on-screen performance for Deep as the Grave using
  Kilmer's actual voice with permission from the Kilmer Estate and SAG-compliant
  processes. The approach ignited debates about posthumous digital performances,
  artistic agency, cultural authenticity, and ethical boundaries for AI in
  filmmaking. Microsoft consolidated Copilot teams under Jacob Andrew to unify
  consumer and commercial experiences and prioritize model-driven development,
  while Anthropic added Claude Code session support to Cowork Dispatch,
  narrowing the gap between mobile task management and cloud coding.


