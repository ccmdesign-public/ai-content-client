title: What Are Kubernetes Services and Why Do You Need Them?
description: >-
  Pod IPs in Kubernetes change every time a pod restarts — so hardcoding them
  into your app is a recipe for disaster. Kubernetes Services solve this by
  providing a stable endpoint (like redis-db) that other pods can reliably
  connect to. Services also expose your app to external users. 


  Full tutorial: https://youtu.be/XuSQU5Grv1g


