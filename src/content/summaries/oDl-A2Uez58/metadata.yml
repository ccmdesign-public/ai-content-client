title: Inside $180B Co-Founder's AI Agent System
description: >-
  I sit down with Furqan Rydhan, a founding team member of Applovin and
  cofounder Founders Inc, as he walks me through Nebula, a Slack-like workspace
  where every channel holds an agent that can execute real work across the tools
  teams already use. We watch Nebula create and edit a Google Slides deck
  end-to-end, including generating an image and handling failures by retrying
  until it lands. Furqan shows how Nebula turns one-off work into repeatable
  “recipes” with scheduled triggers, like adding slides daily or publishing blog
  posts multiple times per day. We also talk about what “business-in-a-box”
  looks like in the AI era; where direction, taste, and quality loops become the
  edge as automation gets widely available. 


  Timestamps:

  00:00 – Intro

  01:51 –Building useful agents for real work

  03:34 – Nebula: a Slack-like agent workspace

  05:04 – Demo: Nebula creating a Deck with Google Slides

  13:25 – The “business in a box” content dream (newsletters, affiliates, ads)

  14:39 – Demo: Automate Blog Posting

  15:52 – What stays valuable when everyone automates

  21:23 – Agent workforce and Building quality loops

  25:38 – Services and agencies: delivering work with fewer humans

  28:53 – Final Thoughts


  Key Points


  * I watch Nebula run like “cloud code for everything else,” automating real
  work across tools and workflows.

  * Agents turn one-time actions into repeatable systems via triggers and
  schedules.

  * The interface mirrors Slack because work already lives in channels, threads,
  and context.

  * Quality becomes the differentiator: critics, scoring, and iteration loops
  upgrade outputs over time.

  * Service businesses and agencies scale faster when agents handle
  production-heavy tasks


  Numbered Section Summaries


  1. Nebula As A Slack For Agents

  I get a tour of Nebula’s channel-based UI, where every channel can hold a
  dedicated agent for a workflow. Furqan frames it as a way to make
  non-engineering work feel like using powerful dev tools—except applied to
  everything.


  2. From Prompt To Slides In Minutes

  We connect Nebula to Google Slides, and it creates a brand-new presentation
  and edits it live. Furqan highlights the key shift: Nebula figures out
  documentation, writes code, executes it, and applies changes directly inside
  the app.


  3. Multi-Modal Work: Text Today, Audio Next

  I call out that this feels like a glimpse into how we’ll interact with
  software going forward. Furqan shares his push toward audio + screen share as
  a high-bandwidth input, where you explain your thinking quickly and the system
  executes.


  4. Image Generation + Failure Recovery In Real Time

  We push the demo further by generating a full-slide image, and we hit some
  real friction—multiple attempts, size constraints, retries. The point lands:
  agents keep iterating until they find a path that works, and the user stays
  focused on the outcome.


  5. Recipes, Triggers, And Autonomous Output

  Furqan shows how Nebula converts context into a repeatable “recipe,” then
  schedules it like a cron job. We use the example of adding slides daily until
  a deck reaches 15 slides, demonstrating hands-off execution.


  6. Business-In-A-Box Content Systems

  My brain immediately goes to automated newsletters and content businesses:
  pulling from X, Google News, press releases, then publishing daily with a
  style guide. Furqan shares his own test blog running 3 posts/day, with search
  traffic already showing up.


  7. Commoditization And The Taste Advantage

  I raise the inevitable question: what happens when everyone can spin up
  automated blogs and workflows. Furqan’s answer centers on escalation—higher
  quality, better delivery, sharper differentiation, and critics that enforce
  standards.


  8. Agency Delivery, Lead Gen, And Company Ops

  We connect the dots to service businesses: content agencies, analytics setups,
  reporting, research—delivered by a smaller human team orchestrating agents.
  The bigger idea becomes an “AI team” that produces meaningful economic value
  when pointed in the right direction.


