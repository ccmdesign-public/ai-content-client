  In this episode, I talk with Matt Howe, a former high school math teacher who started flipping items on Facebook Marketplace to make extra money and eventually built a full equipment dealership. Matt shares how he went from making around $40K as a teacher to flipping lawn mowers for quick profits, earning $20K to $30K in one summer and eventually scaling the operation by hiring drivers, working with a mechanic, and sourcing underpriced equipment from dealers who didn’t want to deal with used inventory. Over time, the side hustle turned into a real dealership doing over $1.1M in a single month in sales. We break down how he finds deals, negotiates prices, scales the operation, and why buying low and moving inventory quickly matters more than fixing things. 

  If you want to follow Matt, check out his YouTube channel: ⁠https://www.youtube.com/@matt_howe

  Enjoy! 
