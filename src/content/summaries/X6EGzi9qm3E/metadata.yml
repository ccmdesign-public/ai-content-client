  Anthropic just dropped Computer Use for Claude Code, which lets it natively
  control your mouse, keyboard, and take screenshots to interact with any app on
  your desktop. 


  In this video I walk through how to enable it, demo it sending files through
  ClickUp and controlling my Mac remotely from my phone using Dispatch, and
  cover the current limitations you should know about. It's in research preview
  right now but there are already some seriously cool use cases here.


