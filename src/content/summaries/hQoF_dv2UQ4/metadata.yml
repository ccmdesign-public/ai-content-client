title: Qwen 3.5 Small Models Are INCREDIBLE! (Testing 0.8B & 2B On Edge Devices)
description: >-
  In this video, we put the brand-new Qwen 3.5 Small Model Series to the
  ultimate test by running the 0.8B and 2B versions locally and 100% offline on
  a MacBook and an iPhone 14 Pro. You’ll see how these "intelligence density"
  powerhouses handle real-world agentic coding tasks in VS Code and native
  multimodal vision tests right from a smartphone. We also dive into the
  breaking news regarding the Qwen team’s sudden restructuring at Alibaba and
  what it means for the future of open-source edge AI.


