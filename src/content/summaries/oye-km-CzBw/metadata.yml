  Canny for feature requests ► https://ahrefs.canny.io/

  ***************************************
  This month, we’ve introduced 17 major updates across Ahrefs!

  Here are the Ahrefs tools receiving key upgrades for November:

  ► Brand Radar
  ► Web Analytics
  ► Report Builder
  ► AI Content Helper
  ► Site Explorer
  ► Site Audit
  ► Keyword Explorer
  ► Google Search Console reports
  ► Social Media Manager
  ► Ahrefs API

  These updates improve how you track, analyze, and act on your data, from YouTube visibility and unified brand metrics in Brand Radar to more precise event segmentation in Web Analytics and greater flexibility in Report Builder. You’ll also find deeper competitive and ads insights in Site Explorer, built-in AI content detection and improved patches in Site Audit, keyword filtering by language, clearer GSC structur report, smoother social media planning, and better visibility into API usage.

  Explore the latest updates to better understand your visibility, refine your analysis, and move faster across your SEO and marketing workflows.

  #productupdates #productchanges #ahrefs
