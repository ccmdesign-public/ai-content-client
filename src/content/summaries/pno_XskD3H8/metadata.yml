  ***************************************

  This month, we’ve introduced 17 major updates across Ahrefs!


  Here are the Ahrefs tools receiving key upgrades:


  ► Brand Radar

  ► Web Analytics

  ► Site Explorer

  ► Site Audit

  ► Keywords Explorer

  ► Rank Tracker

  ► Social Media Manager

  ► Local SEO

  ► Ahrefs API & MCP


  These updates expand automation, filtering, and reporting across the platform,
  including new Brand Radar API endpoints for cited pages, domains, and AI Share
  of Voice history, standalone custom prompt packages, and a refined Search
  Demand view. You’ll also get feature updates in Web Analytics, Site Explorer,
  Site Audit, Rank Tracker workflows, richer social publishing and engagement
  reporting, Google Business Profile verification monitoring, and improved MCP
  access controls for Enterprise teams.


  Explore the latest updates built to give you cleaner data, sharper insights,
  and more control across search and AI visibility.
