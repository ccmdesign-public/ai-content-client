title: Give Your Local AI Access to NotebookLM! (LM Studio + MCP)
description: >-
  Stop hand-coding your MCP configs! If you're manually typing JSON to connect
  LM Studio to NotebookLM, you are actively wasting your build time. I just
  updated the NotebookLM CLI, and it now does the heavy lifting for you in
  seconds.


  In this video, I walk you through the brand new interactive CLI command that
  automatically generates and copies your exact Model Context Protocol (MCP)
  server configuration. No more guessing system paths or dealing with syntax
  errors. I'll show you how to generate the config, paste it directly into LM
  Studio, and get a local Qwen model talking directly to your private NotebookLM
  data—even if you're running it on a basic laptop!


  🚀 WHAT YOU'LL LEARN:

  ✅ How to use the new interactive `nlm setup add json` command

  ✅ The exact steps to configure LM Studio with MCP in under 60 seconds

  ✅ Proof that local, smaller LLMs can successfully manage tool-calling with
  your data


  🔗 RESOURCES:

  Get the CLI Tool on GitHub: https://github.com/jacob-bd/notebooklm-mcp-cli

  Download LM Studio: https://lmstudio.ai/


  If this saved you a headache, hit that Subscribe button for more no-fluff AI
  tutorials!


  #NotebookLM #LMStudio #LocalLLM #GenAI


  ⏱️ Chapters:

  0:00 - The New NotebookLM CLI Update

  0:44 - Why connect to LM Studio?

  1:53 - Generating the MCP JSON Config (The Easy Way)

  4:01 - Walking through the interactive setup

  5:26 - Configuring LM Studio with the new JSON

  6:10 - Important: Setting up Context Length for local models

  6:50 - Testing the connection (Local AI queries NotebookLM!)

  7:38 - Limitations of running small models locally

  8:06 - Outro
