title: "AI NEWS: Anthropic vs US Government + Testing Nanobanana 2"
description: >-
  *Get Matt's AI Playbook:* https://clickhubspot.com/ewc


  Episode 99: What happens when a leading AI company takes a stand against the
  U.S. government’s demands? Join Matt Wolfe (https://x.com/mreflow) and Joe
  Fier (https://www.youtube.com/@joefier) as they break down Anthropic’s
  showdown with the Pentagon—and the price of saying no to mass surveillance and
  autonomous weapons.

  This episode dives into the high-stakes standoff between Anthropic (creators
  of Claude) and the U.S. government. Matt and Joe explain why Anthropic’s
  refusal to loosen its AI’s ethical guardrails could get them blacklisted as a
  supply chain risk, and what that unprecedented move means for the entire tech
  industry. They cover the implications for national security, the tech world’s
  role in military decisions, the Pentagon’s shifting alliances with other AI
  labs, and what it means when Silicon Valley CEOs and government officials are
  at odds. Plus, they demo the latest AI tools—like Google’s Nano Banana 2—and
  dissect the present and future of AI-powered agents and automation, from
  Perplexity Computer to BK’s new “Patty” assistant.


  Check out The Next Wave Podcast if you’re on the go and want to listen to the
  show: https://lnk.to/thenextwaveyt


