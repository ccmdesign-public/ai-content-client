title: 1 Million Sandboxes Per Second?! Dynamic Workers Are INSANE
description: >-
  Cloudflare's new Dynamic Workers let you programmatically create sandboxed
  workers on the fly, and they're 100x faster and more memory efficient than
  traditional containers. In this video, I'll show you how to set them up from
  scratch, run AI-generated code using the Claude SDK, spin up concurrent
  sandboxes in milliseconds, and even push it to 1 million dynamic workers
  running simultaneously. No matter if you're building AI agents, dev previews,
  or custom automations, this could be the fastest sandbox you've ever used.


