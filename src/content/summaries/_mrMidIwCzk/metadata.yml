title: I Let 30 AI Agents Loose in My Repo (Gas Town)
description: >-
  What happens when you turn one AI coding assistant into a coordinated team of
  20–30 agents?


  In this video, I test Gas Town, an open-source AI agent orchestrator, and see
  what happens when I let it loose inside a real codebase. Instead of using
  Claude Code as a single assistant, Gas Town acts like an AI dev team even with
  full persistence if something crashes.


