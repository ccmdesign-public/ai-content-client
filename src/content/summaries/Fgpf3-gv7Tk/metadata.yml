title: How Kubernetes Services Connect Microservices (ClusterIP & NodePort Explained)
description: >-
  Pod IP addresses in Kubernetes change every time a pod restarts — which means
  hardcoding them is a disaster waiting to happen. The right approach is
  Kubernetes Services. In this clip, we walk through how ClusterIP services
  connect internal components like Redis and PostgreSQL, and how NodePort
  services expose the voting and result apps externally. Service naming matters
  too — your apps look for specific hostnames like redis and db to connect.


  Full Kubernetes course - https://www.youtube.com/watch?v=XuSQU5Grv1g


