  NVIDIA announces NemoClaw. This week on Mixture of Experts, host Tim Hwang is
  joined by Merve Unuvar, Martin Keen and Olivia Buzek—who is reporting live
  from NVIDIA GTC. Jensen Huang revealed $1 trillion in orders for Blackwell and
  Vera Rubin systems through 2027, plus the launch of NemoClaw—NVIDIA's
  enterprise-grade AI wrapper built on the OpenClaw agent platform. Next,
  Anthropic announces the Anthropic Institute, but can AI labs honestly audit
  their own technology while building it? Then, Shopify enters the agentic
  shopping arena with AI-powered personal shoppers that could reshape
  e-commerce. Finally, OpenAI increases focus on enteprise users and coding, but
  are they behind? 


