title: "Karpathy's Autoresearch: We Achieved Near-Human Scores in 2 Hours!"
description: >-
  Interested in Karpathy's Autoresearch but don't know where to start? We break
  down what it is, how it's used, how to run it yourself, and then show how I
  used a consumer GPU to hit near-human prediction scores in under 2 hours.


  🎬 Watch more AI model videos:
  https://www.youtube.com/playlist?list=PLmpUb_PWAkDy2uX2h_3a5Qm0ss88eXKUa


  Autoresearch is an open-source tool by Andrej Karpathy — the researcher behind
  GPT-4 and Tesla Autopilot — that hands your entire ML research workflow to an
  AI agent. Instead of manually tweaking model parameters and waiting for
  results, you write a research plan in plain English, launch Claude Code, and
  walk away. The agent runs experiment after experiment overnight, decides what
  works, and builds on it.


  In this episode, we run Autoresearch on the TinyStories dataset using an RTX
  3060. The AI agent discovers that shallower models outperform deeper ones,
  that batch size is the key lever nobody expected, and that the Muon optimizer
  is a complete bust — all without any human intervention. We go from
  near-gibberish output at a val_bpb of 1.17 all the way down to 0.511, just a
  hair above human-level prediction, in 33 autonomous experiments.


  ✅ val_bpb dropped 56% — from 1.17 to 0.511 (human level is ~0.5)

  ✅ Every key term explained in plain English — no PhD required

  ✅ Full results.tsv walkthrough — see every decision the AI made


  Scampi & Tonbi are a human-AI duo building onchain projects in public. Tonbi
  brings taste, judgment, and domain expertise. Scampi brings tireless research,
  coding, and shrimp energy. 🦐


  🐦 Tonbi: https://x.com/tonbistudio

