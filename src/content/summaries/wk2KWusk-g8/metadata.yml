title: "New in March ‘25: Brand Radar, Ahrefs certification and more"
description: >-
  Here’s what’s new in Ahrefs for March 2025, with fresh upgrades and features.


  ***************************************

  Additional Resources:


  Brand Radar ► https://ahrefs.com/brand-radar


  Web Analytics ► https://ahrefs.com/web-analytics


  Site Explorer ► https://ahrefs.com/site-explorer


  Keywords Explorer ► https://ahrefs.com/keywords-explorer


  Rank Tracker ► https://ahrefs.com/rank-tracker


  Ahrefs certification ► https://ahrefs.com/certification


  Canny for feature requests ► https://ahrefs.canny.io/


  ***************************************

  This month, we have 8 tool updates and 1 general update for you.


  Let’s start with our new tool, Brand Radar. It allows you to track your
  brand’s visibility in AI search and see how you stack up against competitors
  in LLMs. The tool is currently in beta and available on all paid plans.


  Moving on to Web Analytics. We’ve added charts that let you visualize the top
  5 visitor trends, quickly switch key metrics, and compare up to 100 items.


  Next is Site Explorer. We have 2 updates here:


  ► You can see paid keywords that already rank in the Top 10 organically, to
  better manage your ad budgets
   ► SERP overview now automatically matches your selected comparison mode.

  Moving on to Keywords Explorer. Here, we’ve added custom filter presets that
  let you save and star your most-used filters for faster access.


  In Rank Tracker, we have 2 updates:


  ► Sparkline charts in GSC keywords and GSC reports make it easy to spot clicks
  and impressions trends for both your keywords and pages.
   ► Tag filters now allow you to create multiple rules and conditions for more precise data and performance segmentation.

  Finally, awesome news: our official Ahrefs certification exam is now live.
  Pass with at least 75% to earn a shareable certificate (valid for one year)
  and showcase your expertise.


  #productupdates #productchanges #ahrefs
