title: I Built an AI That Turns Code Into Cinematic Videos (Codex + NotebookLM)
description: >-
  This is SO cool! My custom NotebookLM MCP connected to Codex just changed the
  game forever, and it's doing things that shouldn't even be possible yet.


  In this video, I reveal the custom NotebookLM MCP and CLI I built to give
  Codex God-tier access to NotebookLM. 


  I walk you through the exact setup to inject this MCP, CLI and Agent skill
  directly into Codex. But here is where it gets absolutely insane: I feed a
  massive codebase to Codex and command it to spin up a custom NotebookLM. From
  there, it auto-generates a stunning presentation explaining the architecture
  AND produces a full cinematic video using brand-new functionality. 


  This isn't just coding; this is an entire project visualization on autopilot. 


  🔥 Key Takeaways:

  • ⚙️ How to set up my custom NotebookLM MCP, CLI and skill with Codex.

  • 🧠 The exact prompt workflow to force Codex to scan and digest entire
  codebases.

  • 🚀 How to leverage NotebookLM features to auto-generate slides and cinematic
  videos from raw code for your project, either code or anything else


