title: NVIDIA's NEW Nemotron 3 Super in 6 Minutes
description: >-
  NVIDIA Nemotron 3 Super: Latent MoE + Hybrid Mamba, 1M Context, Faster
  Inference


  NVIDIA released Nemotron 3 Super, a new mixture-of-experts model with a new
  architecture combining latent mixture of experts and a hybrid Mamba approach
  to blend transformer strengths with Mamba speed. The model has 120B total
  parameters with about 12B active per token, improving inference speed. Unlike
  standard MoE that routes raw tokens to experts, latent MoE compresses tokens
  before routing so experts process smaller inputs, enabling up to four times
  more experts at the same cost. The script covers third-party openness vs.
  intelligence benchmarking, noting NVIDIA’s permissive access (download
  weights, self-host, fine-tune, commercialize) and training documentation. It
  highlights 1M-token context, strong long-context multi-user efficiency,
  availability via Perplexity, developer tools, Hugging Face, major clouds, and
  benchmarks showing improved throughput and coding performance versus prior
  Nemotron and other sub-250B models.


