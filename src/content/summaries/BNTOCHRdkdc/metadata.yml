title: "Claude Code Remote Control: New Session Grayed Out? Here's the Fix"
description: >-
  Claude Code Remote Control just got a major upgrade — you can now start brand
  new sessions directly from your phone, not just pick up ones you already
  started at your desk.


  The problem? Anthropic didn't document how to set this up, and the button to
  create new sessions is grayed out for most people. In this video I show you
  exactly what's missing and how to fix it in under 2 minutes.


  I'll walk you through why the new session button is grayed out, the one
  command you need to run to unlock it, the GitHub requirement they forgot to
  mention, and the new remote slash command support that also shipped recently.


  ⌚ TIMESTAMPS:

  0:00 - The problem: new sessions grayed out

  0:18 - Showing the issue on iPhone

  0:32 - Why it's grayed out & requirements

  0:50 - The fix: running spawn mode

  1:06 - Starting a new session from your phone

  1:26 - Up to 32 sessions per directory

  1:48 - Ending sessions with Ctrl+C

  2:08 - Bonus: slash commands now work in remote control


