title: SQLite is 138x Slower Than This?! (Testing Stoolap)
description: >-
  In this video, we put a new Rust-powered database called Stoolap to the test
  to see if it can truly outperform the industry-standard SQLite in a Node.js
  environment. We break down the high-performance architecture behind Stoolap,
  including its use of NAPI-RS for shared memory and Rayon for parallel
  execution, while navigating the real-world hurdles of building the native
  driver from source. Through live benchmarks of complex analytical queries, we
  reveal whether the 138 times faster claims hold up and define exactly when you
  should stick with SQLite or upgrade to this high-speed race car for data
  analysis.


