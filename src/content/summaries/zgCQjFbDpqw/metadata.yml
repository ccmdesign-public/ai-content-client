  Key Changes in This Release:

  - MCP elicitation: servers request structured input mid-task via interactive
  dialogs, with Elicitation and ElicitationResult hooks

  - Worktree sparsePaths: sparse-checkout only the directories you need in large
  monorepos

  - Auto-compaction circuit breaker: stops retrying after 3 consecutive failures
  instead of looping indefinitely

  - Remote Control: sessions survive idle reaping, rapid messages are batched,
  titles come from your first prompt

  - Voice mode: keypresses no longer swallowed during permission dialogs, /voice
  works on Windows via npm


